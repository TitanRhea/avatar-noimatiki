<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Professional Sign Language</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 350px;
        }
        .controls { pointer-events: auto; }
        select, button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: 1px solid #ddd; background: white; transition: 0.3s;
        }
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; width: 220px; }
        #mic-btn.listening { background-color: #f44336; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Μικρόφωνο Απενεργοποιημένο</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Άνοιγμα Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false, last_activity_time = Date.now();
        const deg = (d) => d * (Math.PI / 180);

        const basePose = { x: 54, y: 30, z: 17 };

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = { r_fingers: [], l_fingers: [] };
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);
                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                        if (b.endsWith('righthand')) bones.r_wrist = n;
                        if (b.endsWith('lefthand')) bones.l_wrist = n;
                        
                        // Πιάσιμο όλων των αρθρώσεων των δακτύλων
                        if (b.includes('righthand') && !b.endsWith('righthand')) bones.r_fingers.push(n);
                        if (b.includes('lefthand') && !b.endsWith('lefthand')) bones.l_fingers.push(n);
                    }
                });
                resetPose(0.1);
            });
        }

        // Βοηθητική συνάρτηση για κλείσιμο δακτύλων (Fist)
        function curlFingers(side, amount, skipIndex = false) {
            const list = side === 'r' ? bones.r_fingers : bones.l_fingers;
            const direction = side === 'r' ? 1 : -1;
            list.forEach(f => {
                if (skipIndex && f.name.toLowerCase().includes('index')) return;
                gsap.to(f.rotation, { z: deg(amount * direction), duration: 0.5 });
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(basePose.z), duration: speed });
            gsap.to(bones.l_shoulder.rotation, { x: deg(basePose.x), y: deg(-basePose.y), z: deg(-basePose.z), duration: speed });
            [bones.r_elbow, bones.l_elbow, bones.r_wrist, bones.l_wrist].forEach(b => { if(b) gsap.to(b.rotation, { x: 0, y: 0, z: 0, duration: speed }); });
            bones.r_fingers.concat(bones.l_fingers).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        // --- ΚΙΝΗΣΕΙΣ ---

        function gesture_efcharisto() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(27), y: deg(-35), z: deg(-26), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(-26), z: deg(-107), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(-27), z: deg(-24), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(91), y: deg(-24), z: deg(-107), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(52), y: deg(27), z: deg(24), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(91), y: deg(24), z: deg(107), duration: 0.5 });
                curlFingers('r', 85); curlFingers('l', 85);
                setTimeout(finalize_gesture, 1200);
            }, 600);
        }

        function gesture_kalimera() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_wrist.rotation, { y: deg(-60), duration: 0.3 }); // Στροφή αντιβραχίου
                curlFingers('r', 90, true); // Κλείσε όλα εκτός δείκτη
                const indexBones = bones.r_fingers.filter(f => f.name.toLowerCase().includes('index'));
                const tl = gsap.timeline({ repeat: 3, onComplete: finalize_gesture });
                tl.to(indexBones.map(b => b.rotation), { z: deg(45), duration: 0.2 })
                  .to(indexBones.map(b => b.rotation), { z: deg(0), duration: 0.2 });
            }, 600);
        }

        function gesture_mesimeri() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(7), z: deg(-34), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(21), y: deg(-44), z: deg(-121), duration: 0.5 });
                const tl = gsap.timeline({ repeat: 2, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { y: deg(35), duration: 0.3 }).to(bones.r_wrist.rotation, { y: deg(-35), duration: 0.3 });
            }, 600);
        }

        function gesture_geia() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(11), y: deg(18), z: deg(4), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-10), y: deg(35), z: deg(-128), duration: 0.5 });
            setTimeout(() => {
                const tl = gsap.timeline({ repeat: 4, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { z: deg(25), duration: 0.2 }).to(bones.r_wrist.rotation, { z: deg(-25), duration: 0.2 });
            }, 600);
        }

        function gesture_onoma() {
            is_busy = true;
            // Φάση 1: Εσύ
            gsap.to(bones.r_shoulder.rotation, { x: deg(39), y: deg(-24), z: deg(-58), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(46), z: deg(-31), duration: 0.5 });
            curlFingers('r', 90, true);
            
            setTimeout(() => {
                // Φάση 2: Όνομα (Κυκλάκια)
                gsap.to(bones.r_shoulder.rotation, { x: deg(25), y: deg(7), z: deg(-51), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(59), y: deg(1), z: deg(-48), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(25), y: deg(-7), z: deg(51), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(59), y: deg(1), z: deg(48), duration: 0.5 });
                curlFingers('l', 90, true);

                // Η κυκλική κίνηση (Animation Loop)
                let startTime = Date.now();
                const animateCircles = () => {
                    let elapsed = (Date.now() - startTime) / 1000;
                    if (elapsed < 2.5) {
                        const wave = Math.sin(elapsed * 10) * 0.15;
                        const cosWave = Math.cos(elapsed * 10) * 0.1;
                        bones.r_wrist.rotation.x = wave;
                        bones.l_wrist.rotation.x = wave;
                        bones.r_wrist.rotation.y = cosWave;
                        bones.l_wrist.rotation.y = -cosWave;
                        requestAnimationFrame(animateCircles);
                    } else { finalize_gesture(); }
                };
                animateCircles();
            }, 1000);
        }

        function finalize_gesture() { resetPose(); is_busy = false; last_activity_time = Date.now(); }

        // ΦΩΝΗΤΙΚΟΣ ΕΛΕΓΧΟΣ
        const micBtn = document.getElementById('mic-btn');
        const subtitle = document.getElementById('subtitle');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                subtitle.innerText = "Είπες: " + text;
                
                if (text.includes("ευχαριστώ") || text.includes("ευχαριστω")) gesture_efcharisto();
                else if (text.includes("καλημέρα") || text.includes("καλημερα")) gesture_kalimera();
                else if (text.includes("μεσημέρι") || text.includes("μεσημερι")) gesture_mesimeri();
                else if (text.includes("γεια") || text.includes("χαίρετε")) gesture_geia();
                else if (text.includes("όνομα") || text.includes("λένε") || text.includes("εσύ")) gesture_onoma();
            };

            recognition.onend = () => { if(isListening) recognition.start(); };
        }

        micBtn.onclick = () => {
            if (!isListening) {
                recognition.start();
                isListening = true;
                micBtn.innerText = "🛑 Κλείσιμο Μικροφώνου";
                micBtn.classList.add('listening');
                subtitle.innerText = "Ακούω...";
            } else {
                isListening = false;
                recognition.stop();
                micBtn.innerText = "🎙️ Άνοιγμα Μικροφώνου";
                micBtn.classList.remove('listening');
                subtitle.innerText = "Μικρόφωνο Απενεργοποιημένο";
            }
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

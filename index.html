<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Calibration Tool</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #slider-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9);
            padding: 15px; border-radius: 10px; pointer-events: auto; text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 14px;
        }
        .slider-row { margin-bottom: 10px; }
        .slider-row label { display: inline-block; width: 80px; font-weight: bold; }
        .slider-row input { width: 150px; vertical-align: middle; }
        .val-disp { display: inline-block; width: 40px; text-align: right; font-family: monospace;}
        select { font-size: 16px; padding: 10px; border-radius: 5px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="slider-panel">
        <h3>Δεξί Χέρι - Βρες το Στέρνο!</h3>
        
        <div class="slider-row">
            <label>Ώμος X:</label>
            <input type="range" id="sh-x" min="-180" max="180" value="54" oninput="updatePose()">
            <span class="val-disp" id="val-sh-x">54</span>
        </div>
        <div class="slider-row">
            <label>Ώμος Y:</label>
            <input type="range" id="sh-y" min="-180" max="180" value="30" oninput="updatePose()">
            <span class="val-disp" id="val-sh-y">30</span>
        </div>
        <div class="slider-row">
            <label>Ώμος Z:</label>
            <input type="range" id="sh-z" min="-180" max="180" value="17" oninput="updatePose()">
            <span class="val-disp" id="val-sh-z">17</span>
        </div>
        <hr>
        <div class="slider-row">
            <label>Αγκώνας X:</label>
            <input type="range" id="el-x" min="-180" max="180" value="0" oninput="updatePose()">
            <span class="val-disp" id="val-el-x">0</span>
        </div>
        <div class="slider-row">
            <label>Αγκώνας Y:</label>
            <input type="range" id="el-y" min="-180" max="180" value="0" oninput="updatePose()">
            <span class="val-disp" id="val-el-y">0</span>
        </div>
        <div class="slider-row">
            <label>Αγκώνας Z:</label>
            <input type="range" id="el-z" min="-180" max="180" value="0" oninput="updatePose()">
            <span class="val-disp" id="val-el-z">0</span>
        </div>
    </div>

    <div id="ui-layer">
        <select id="avatar-select" onchange="loadAvatar(this.value)">
            <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
            <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
        </select>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3.5); // Πιο κοντινή κάμερα για να βλέπεις καλά

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {};
        const deg = (d) => d * (Math.PI / 180);

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                
                // Set default order to avoid weird twisting
                if(bones.r_shoulder) bones.r_shoulder.rotation.order = 'XYZ';
                if(bones.l_shoulder) bones.l_shoulder.rotation.order = 'XYZ';
                
                // Apply initial slider values
                updatePose();
            });
        }

        function updatePose() {
            if (!bones.r_shoulder) return;

            // Παίρνουμε τις τιμές από τις μπάρες
            const sx = document.getElementById('sh-x').value;
            const sy = document.getElementById('sh-y').value;
            const sz = document.getElementById('sh-z').value;
            
            const ex = document.getElementById('el-x').value;
            const ey = document.getElementById('el-y').value;
            const ez = document.getElementById('el-z').value;

            // Ενημερώνουμε τα νουμεράκια στην οθόνη
            document.getElementById('val-sh-x').innerText = sx;
            document.getElementById('val-sh-y').innerText = sy;
            document.getElementById('val-sh-z').innerText = sz;
            document.getElementById('val-el-x').innerText = ex;
            document.getElementById('val-el-y').innerText = ey;
            document.getElementById('val-el-z').innerText = ez;

            // Εφαρμόζουμε την κίνηση ζωντανά στο μοντέλο
            bones.r_shoulder.rotation.set(deg(sx), deg(sy), deg(sz));
            if(bones.r_elbow) bones.r_elbow.rotation.set(deg(ex), deg(ey), deg(ez));
        }

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Perfect Continuous Flow</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: auto;
        }
        #subtitle {
            font-size: 22px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 380px; max-width: 85%; word-wrap: break-word; pointer-events: none;
        }
        .controls { display: flex; justify-content: center; gap: 10px; align-items: center; pointer-events: auto;}
        button { 
            font-size: 16px; padding: 12px 25px; border-radius: 10px; 
            cursor: pointer; border: none; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        select { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white;}
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Μικρόφωνο Κλειστό</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="updated_model.glb">Avatar: Rhea (Συνεχής Ροή)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        const deg = (d) => d * (Math.PI / 180);
        const basePose = { x: 54, y: 30, z: 17 };

        let gestureQueue = [];
        let global_full_text = ""; // Η αθροιστική μνήμη
        let processed_index = 0; // Δείκτης για το τι έχει ήδη μπει στην ουρά

        function enqueueGesture(gestureName) {
            gestureQueue.push(gestureName);
            if (!is_busy) processQueue();
        }

        function processQueue() {
            if (is_busy || gestureQueue.length === 0) return;
            is_busy = true;

            let nextGesture = gestureQueue.shift();
            // Εκτέλεση κινήσεων
            if (nextGesture === 'efcharisto') gesture_efcharisto();
            else if (nextGesture === 'kalimera') gesture_kalimera();
            else if (nextGesture === 'mesimeri') gesture_mesimeri();
            else if (nextGesture === 'geia') gesture_geia();
            else if (nextGesture === 'onoma') gesture_onoma();
            else { is_busy = false; processQueue(); }
        }

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        function loadAvatar(file) {
            const finalPath = file + "?v=" + Date.now();
            if (currentModel) scene.remove(currentModel);
            bones = { r_fingers: [], l_fingers: [], r_joints: {}, l_joints: {} }; 
            
            loader.load(finalPath, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);
                
                currentModel.traverse(n => {
                    if (n.isMesh && (n.name.toLowerCase().includes('cube') || n.name.toLowerCase().includes('box'))) n.visible = false;
                    if (n.isBone) {
                        const bName = n.name;
                        const bLower = bName.toLowerCase();
                        if (bLower.includes('jaw')) bones.jaw = n;
                        if (bName === 'mixamorig6RightArm') bones.r_shoulder = n;
                        if (bName === 'mixamorig6RightForeArm') bones.r_elbow = n;
                        if (bName === 'mixamorig6RightHand') bones.r_wrist = n;
                        if (bName === 'mixamorig6LeftArm') bones.l_shoulder = n;
                        if (bName === 'mixamorig6LeftForeArm') bones.l_elbow = n;
                        if (bName === 'mixamorig6LeftHand') bones.l_wrist = n;
                        const match = bLower.match(/(thumb|index|middle|ring|pinky)(\d)/);
                        if (match) {
                            if (bLower.includes('right')) { bones.r_joints[match[0]] = n; bones.r_fingers.push(n); } 
                            else if (bLower.includes('left')) { bones.l_joints[match[0]] = n; bones.l_fingers.push(n); }
                        }
                    }
                });
                setTimeout(() => { resetPose(0.1); }, 400);
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(basePose.z), duration: speed });
            if (bones.l_shoulder) gsap.to(bones.l_shoulder.rotation, { x: deg(basePose.x), y: deg(-basePose.y), z: deg(-basePose.z), duration: speed });
            [bones.r_elbow, bones.l_elbow, bones.r_wrist, bones.l_wrist].forEach(b => { if(b) gsap.to(b.rotation, { x: 0, y: 0, z: 0, duration: speed }); });
            bones.r_fingers.concat(bones.l_fingers).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        function clearFingers(speed = 0.2) {
            if (bones.r_fingers) {
                bones.r_fingers.concat(bones.l_fingers).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
            }
        }

        function finalize_gesture() { 
            // Αν υπάρχουν κι άλλες λέξεις, κάνουμε γρήγορη μετάβαση
            if (gestureQueue.length > 0) {
                clearFingers(0.15);
                if(bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x:0, y:0, z:0, duration: 0.15 });
                setTimeout(() => { is_busy = false; processQueue(); }, 160);
            } else {
                // Μόνο αν αδειάσει η ουρά επιστρέφουμε σε A-Pose
                resetPose(0.4);
                is_busy = false;
            }
        }

        function customFist(duration = 0.1) {
            if(bones.r_joints['index1']) {
                ['thumb','index','middle','ring','pinky'].forEach(f => {
                    const rj = bones.r_joints[f+'1'];
                    const lj = bones.l_joints[f+'1'];
                    if(rj) gsap.to(rj.rotation, {x: deg(60), duration});
                    if(lj) gsap.to(lj.rotation, {x: deg(60), duration});
                });
            }
        }

        function customKalimeraPart2(side, duration = 0.1) {
            const j = side === 'r' ? bones.r_joints : bones.l_joints;
            if(j['index1']) gsap.to(j['index1'].rotation, {x: 0, duration});
            ['middle','ring','pinky'].forEach(f => { if(j[f+'1']) gsap.to(j[f+'1'].rotation, {x: deg(90), duration}); });
        }

        // === GESTURES (ΚΛΕΙΔΩΜΕΝΑ) ===
        function gesture_efcharisto() {
            gsap.to(bones.r_shoulder.rotation, { x: deg(27), y: deg(-35), z: deg(-26), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(-26), z: deg(-107), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(-27), z: deg(-24), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(91), y: deg(-24), z: deg(-107), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(52), y: deg(27), z: deg(24), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(91), y: deg(24), z: deg(107), duration: 0.5 });
                const pulse = gsap.timeline({ repeat: 1, onComplete: finalize_gesture });
                pulse.to({}, { duration: 0.2, onStart: () => customFist(0.1) })
                     .to({}, { duration: 0.2, onStart: () => clearFingers(0.1) });
            }, 600);
        }

        function gesture_kalimera() {
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_wrist.rotation, { y: deg(-160), duration: 0.3 });
                customKalimeraPart2('r', 0.2);
                setTimeout(() => {
                    const idx = [bones.r_joints['index1'], bones.r_joints['index2']].filter(b=>b);
                    const flick = gsap.timeline({ repeat: 1, onComplete: finalize_gesture });
                    flick.to(idx.map(b=>b.rotation), { x: deg(60), duration: 0.15 }).to(idx.map(b=>b.rotation), { x: 0, duration: 0.15 });
                }, 400);
            }, 600);
        }

        function gesture_onoma() {
            gsap.to(bones.r_shoulder.rotation, { x: deg(50), y: deg(-15), z: deg(-70), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-9), y: deg(32), z: deg(-10), duration: 0.5 });
            customKalimeraPart2('r', 0.3);
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(25), y: deg(7), z: deg(-51), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(25), y: deg(-7), z: deg(51), duration: 0.5 });
                const start = Date.now();
                const draw = () => {
                    let el = (Date.now() - start) / 1000;
                    if (el < 2.5) {
                        if(bones.r_wrist) bones.r_wrist.rotation.x = Math.sin(el * 11) * 0.35;
                        if(bones.l_wrist) bones.l_wrist.rotation.x = Math.sin(el * 11) * 0.35;
                        requestAnimationFrame(draw);
                    } else { finalize_gesture(); }
                };
                draw();
            }, 1000);
        }

        function gesture_mesimeri() {
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(60), y: deg(-10), z: deg(-43), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(43), y: deg(-38), z: deg(-83), duration: 0.5 });
                const tl = gsap.timeline({ repeat: 1, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { z: deg(25), duration: 0.3 }).to(bones.r_wrist.rotation, { z: deg(-25), duration: 0.3 });
            }, 600);
        }

        function gesture_geia() {
            gsap.to(bones.r_shoulder.rotation, { x: deg(11), y: deg(18), z: deg(4), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-10), y: deg(35), z: deg(-128), duration: 0.5 });
            setTimeout(() => {
                const tl = gsap.timeline({ repeat: 3, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { z: deg(25), duration: 0.25 }).to(bones.r_wrist.rotation, { z: deg(-25), duration: 0.25 });
            }, 600);
        }

        // === ΜΙΚΡΟΦΩΝΟ ΜΕ ΣΥΝΕΧΗ ΜΝΗΜΗ ===
        const micBtn = document.getElementById('mic-btn');
        const subtitle = document.getElementById('subtitle');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let current_transcript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    current_transcript += event.results[i][0].transcript.toLowerCase();
                }

                // Ενημέρωση της συνολικής μνήμης χωρίς να σβήνουμε
                global_full_text += " " + current_transcript;
                
                // Φιλτράρισμα για να μην έχουμε τεράστια strings με επαναλήψεις από το interim
                // Κρατάμε μόνο το μοναδικό νέο κείμενο
                let text_to_scan = global_full_text.substring(processed_index);
                subtitle.innerText = "Είπες: " + current_transcript;

                const keywords = {
                    'efcharisto': ["ευχαριστώ", "ευχαριστω"],
                    'kalimera': ["καλημέρα", "καλημερα"],
                    'mesimeri': ["μεσημέρι", "μεσημερι", "καλό μεσημέρι"],
                    'geia': ["γεια", "χαίρετε", "γειά"],
                    'onoma': ["όνομα", "ονομα", "ποιο είναι", "ποιο ειναι"]
                };

                // Έξυπνη σάρωση για την ουρά
                for (const [gesture, triggerWords] of Object.entries(keywords)) {
                    triggerWords.forEach(word => {
                        let idx = text_to_scan.indexOf(word);
                        if (idx !== -1) {
                            enqueueGesture(gesture);
                            // Μετακινούμε τον δείκτη επεξεργασίας μπροστά για να μην ξαναβρεί την ίδια λέξη
                            processed_index += idx + word.length;
                            text_to_scan = global_full_text.substring(processed_index);
                        }
                    });
                }
            };

            recognition.onend = () => {
                if (isListening) recognition.start(); // Αυτόματη επανεκκίνηση για αδιάκοπη ροή
            };
        }

        micBtn.onclick = () => {
            if (!isListening) {
                isListening = true;
                global_full_text = "";
                processed_index = 0;
                recognition.start();
                micBtn.innerText = "🛑 Κλείσιμο";
                micBtn.classList.add('listening');
                subtitle.innerText = "Ακούω...";
            } else {
                isListening = false;
                recognition.stop();
                micBtn.innerText = "🎙️ Ενεργοποίηση";
                micBtn.classList.remove('listening');
                subtitle.innerText = "Μικρόφωνο Κλειστό";
            }
        };

        loadAvatar('updated_model.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

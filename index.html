<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar System - Test Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 18px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 350px; border: 2px solid #4CAF50;
        }
        .controls { pointer-events: auto; }
        button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: none; background: #4CAF50; color: white; font-weight: bold;
        }
        button.listening { background-color: #f44336; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Αναμονή για test.glb...</div><br>
        <div class="controls">
            <button id="mic-btn">🎙️ Ενεργοποίηση Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.4, 0);
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        const deg = (d) => d * (Math.PI / 180);
        const basePose = { x: 54, y: 30, z: 17 };
        const VOWEL_OPEN = { 'α': 115, 'ε': 105, 'η': 105, 'ι': 100, 'ο': 110, 'υ': 100, 'ω': 110 };
        let gestureQueue = [];

        function loadAvatar(file) {
            const finalPath = file + "?v=" + Date.now();
            document.getElementById('subtitle').innerText = "Φόρτωση: " + file;
            
            if (currentModel) scene.remove(currentModel);
            bones = { r_joints: {}, r_fingers: [] };
            
            new THREE.GLTFLoader().load(finalPath, (gltf) => {
                currentModel = gltf.scene;
                currentModel.traverse(n => {
                    if (n.isMesh) {
                        const meshSize = new THREE.Box3().setFromObject(n).getSize(new THREE.Vector3());
                        if (meshSize.x > 2 || n.name.toLowerCase().includes('cube') || n.name.toLowerCase().includes('sphere')) {
                            n.visible = false; 
                        }
                    }
                    if (n.isBone) {
                        const bl = n.name.toLowerCase();
                        if (bl.includes('jaw')) bones.jaw = n;
                        if (bl.endsWith('rightarm') || bl.includes('rightarm')) bones.r_shoulder = n;
                        if (bl.endsWith('rightforearm') || bl.includes('rightforearm')) bones.r_elbow = n;
                        if (bl.endsWith('righthand') || bl.includes('righthand')) bones.r_wrist = n;
                        const match = bl.match(/(thumb|index|middle|ring|pinky)(\d)/);
                        if (bl.includes('righthand') && match) {
                            bones.r_joints[match[0]] = n;
                            bones.r_fingers.push(n);
                        }
                    }
                });
                currentModel.position.set(0, 0, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1);
                scene.add(currentModel);
                setTimeout(() => { resetPose(0.1); if (bones.jaw) bones.jaw.rotation.x = deg(90); }, 200);
                document.getElementById('subtitle').innerText = "Το test.glb φορτώθηκε!";
            }, 
            (xhr) => {
                const p = Math.round((xhr.loaded / xhr.total) * 100);
                if (p) document.getElementById('subtitle').innerText = "Λήψη: " + p + "%";
            },
            (err) => { document.getElementById('subtitle').innerText = "Σφάλμα φόρτωσης test.glb"; });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(basePose.z), duration: speed });
            if(bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if(bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x: 0, y: 0, z: 0, duration: speed });
            bones.r_fingers.forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        function speakWord(word, total_time = 1.5) {
            if (!bones.jaw) return;
            const vowels = [...word.toLowerCase()].filter(c => VOWEL_OPEN[c]);
            const step_time = total_time / (vowels.length || 1);
            const tl = gsap.timeline();
            vowels.forEach(v => {
                tl.to(bones.jaw.rotation, { x: deg(VOWEL_OPEN[v]), duration: step_time / 2 })
                  .to(bones.jaw.rotation, { x: deg(90), duration: step_time / 2 });
            });
        }

        function gesture_onoma() {
            is_busy = true; speakWord("Όνομα", 1.2);
            gsap.to(bones.r_shoulder.rotation, { x: 0, y: 0, z: 0, duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: 0.5 });
            const fingers = ['thumb', 'index', 'middle', 'ring', 'pinky'];
            fingers.forEach(f => { [1,2,3].forEach(num => { if(bones.r_joints[f+num]) gsap.to(bones.r_joints[f+num].rotation, { x: 0, duration: 0.5 }); }); });
            setTimeout(() => { resetPose(); is_busy = false; }, 3000);
        }

        const micBtn = document.getElementById('mic-btn');
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.continuous = true;
            recognition.onresult = (event) => {
                const text = event.results[event.results.length-1][0].transcript.toLowerCase().trim();
                document.getElementById('subtitle').innerText = "Είπες: " + text;
                if (text.includes("όνομα")) gesture_onoma();
                else speakWord(text);
            };
            micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); };
        }

        loadAvatar('test.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Final Pose Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px; border-radius: 15px; display: inline-block;
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            pointer-events: auto; background: rgba(255, 255, 255, 0.9);
            padding: 12px; border-radius: 12px; display: inline-block;
        }
        select, button { font-size: 16px; padding: 8px 15px; margin: 5px; border-radius: 6px; cursor: pointer; }
        #mic-btn { background-color: #4CAF50; color: white; border: none; }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="subtitle">Περιμένω φωνητική εντολή...</div><br>
        <div class="controls">
            <select id="avatar-select">
                <option value="rhea.glb">Avatar 1: Rhea</option>
                <option value="titan.glb">Avatar 2: Titan</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3.0); // Πιο κοντά στο αβατάρ

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.3, 0); // Κοιτάζει ψηλά στο πρόσωπο
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        let currentModel = null, is_busy = false, gesture_queue = [], last_activity_time = Date.now();
        let bones = {};
        const deg = (d) => d * (Math.PI / 180);

        function hpr(bone, v1, v2, v3, duration = 0.5) {
            if (!bone) return;
            bone.rotation.order = 'ZXY';
            // Μετάφραση: v1=Y (στροφή), v2=X (μπρος-πίσω), v3=Z (πάνω-κάτω πλάι)
            gsap.to(bone.rotation, {
                x: deg(v2), 
                y: deg(v1), 
                z: deg(v3), 
                duration: duration, 
                ease: "power2.inOut"
            });
        }

        const loader = new THREE.GLTFLoader();
        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            loader.load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, -0.2, 0); // Το κατεβάζουμε λίγο για να φαίνεται το κεφάλι κέντρο
                currentModel.scale.set(1.3, 1.3, 1.3); // Μεγαλύτερο αβατάρ
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const name = n.name.toLowerCase();
                        if (name.endsWith('rightarm')) bones.r_shoulder = n;
                        if (name.endsWith('rightforearm')) bones.r_elbow = n;
                        if (name.endsWith('righthand')) bones.r_wrist = n;
                        if (name.endsWith('leftarm')) bones.l_shoulder = n;
                        if (name.endsWith('leftforearm')) bones.l_elbow = n;
                        if (name.endsWith('lefthand')) bones.l_wrist = n;
                    }
                });
                resetPose(0.1);
                document.getElementById('subtitle').innerText = "Έτοιμος!";
            });
        }

        function resetPose(speed = 0.5) {
            // Χρησιμοποιούμε τον άξονα Z για να πέσουν τα χέρια κάτω (v3)
            hpr(bones.r_shoulder, 0, 0, -65, speed); 
            hpr(bones.l_shoulder, 0, 0, 65, speed);
            [bones.r_elbow, bones.l_elbow, bones.r_wrist, bones.l_wrist].forEach(b => hpr(b, 0, 0, 0, speed));
        }

        // --- Κινήσεις Διορθωμένες ---
        function gesture_kalimera() {
            is_busy = true;
            // Σηκώνει το δεξί χέρι μπροστά και πάνω
            hpr(bones.r_shoulder, 0, -60, -20, 0.4); 
            hpr(bones.r_elbow, 0, -40, 0, 0.4);
            setTimeout(() => {
                hpr(bones.r_wrist, 30, 0, 0, 0.2);
                setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 800);
            }, 500);
        }

        function gesture_geia() {
            is_busy = true;
            hpr(bones.r_shoulder, 0, -80, -30, 0.4);
            setTimeout(() => {
                hpr(bones.r_wrist, 0, 0, 40, 0.2);
                setTimeout(() => { hpr(bones.r_wrist, 0, 0, -40, 0.2); }, 200);
                setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 800);
            }, 500);
        }

        function gesture_efcharisto() {
            is_busy = true;
            hpr(bones.r_shoulder, 0, -40, -10, 0.4);
            hpr(bones.r_elbow, 0, -80, 0, 0.4);
            setTimeout(() => {
                hpr(bones.r_shoulder, 0, -20, -10, 0.4);
                setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 1000);
            }, 600);
        }

        function gesture_onoma() {
            is_busy = true;
            hpr(bones.r_shoulder, 0, -50, -40, 0.4);
            setTimeout(() => {
                hpr(bones.r_shoulder, 40, -50, -40, 0.4);
                setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 1000);
            }, 600);
        }

        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                const w = gesture_queue.shift();
                if (w.includes("καλημερα")) gesture_kalimera();
                else if (w.includes("γεια")) gesture_geia();
                else if (w.includes("ευχαριστ")) gesture_efcharisto();
                else if (w.includes("ονομα")) gesture_onoma();
            }
            if (!is_busy && Date.now() - last_activity_time > 4000) resetPose(1.0);
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'el-GR'; recognition.continuous = true;
        recognition.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = "Είπες: " + t;
            t.split(" ").forEach(word => gesture_queue.push(word));
        };
        micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); };

        loadAvatar('rhea.glb');
        document.getElementById('avatar-select').onchange = (e) => loadAvatar(e.target.value);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Ελληνική Νοηματική</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 26px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 30px; border-radius: 20px; display: inline-block;
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .controls {
            pointer-events: auto; background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        select, button {
            font-size: 16px; padding: 10px 20px; margin: 5px; border-radius: 8px;
            border: 1px solid #ccc; cursor: pointer;
        }
        
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; transition: 0.3s; }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Φόρτωση Συστήματος...</div><br>
        <div class="controls">
            <select id="avatar-select">
                <option value="rhea.glb">Avatar 1: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar 2: Titan (Άνδρας)</option>
            </select>
            <select id="axis-select">
                <option value="1">Κίνηση: Mode 1 (Λάθος/Original)</option>
                <option value="2">Κίνηση: Mode 2 (Σωστό Panda3D)</option>
                <option value="3">Κίνηση: Mode 3 (Ανταλλαγή Y-Z)</option>
                <option value="4">Κίνηση: Mode 4 (Ανάποδο Z-Up)</option>
                <option value="5">Κίνηση: Mode 5 (Πλήρης Αναστροφή)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(240/255, 230/255, 220/255);
        
        // --- 1. ΔΙΟΡΘΩΣΑΜΕ ΤΗΝ ΚΑΜΕΡΑ ΝΑ ΕΙΝΑΙ ΠΙΟ ΠΙΣΩ (Από 3.5 πήγε στο 6.5) ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.update();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        let currentModel = null;
        let r_shoulder, l_shoulder, r_elbow, l_elbow, r_wrist, l_wrist;
        let r_fingers = [], l_fingers = [], r_joints_all = {};
        let is_busy = false;
        let gesture_queue = [];
        let last_activity_time = Date.now();
        
        const deg = (d) => d * (Math.PI / 180);
        
        // --- 2. Ο ΕΞΥΠΝΟΣ ΔΙΟΡΘΩΤΗΣ ΚΙΝΗΣΕΩΝ (MOTION FIXER) ---
        function hprInterval(joint, v1, v2, v3, duration) {
            if (!joint) return;
            
            let mode = document.getElementById('axis-select').value;
            let rx = 0, ry = 0, rz = 0;
            
            // Το κάθε Mode δοκιμάζει άλλη μετάφραση από την Python στο Web
            if (mode === "1") { rx = v1; ry = v2; rz = v3; }
            else if (mode === "2") { rx = v2; ry = v1; rz = v3; } // Η πιθανότερη λύση
            else if (mode === "3") { rx = v1; ry = v3; rz = v2; }
            else if (mode === "4") { rx = -v2; ry = -v1; rz = -v3; }
            else if (mode === "5") { rx = v3; ry = v2; rz = v1; }

            gsap.to(joint.rotation, {
                x: deg(rx), 
                y: deg(ry), 
                z: deg(rz), 
                duration: duration, 
                ease: "power1.inOut" // Έκανα τις κινήσεις ακόμα πιο ομαλές
            });
        }

        function invoke(func, delay_sec) { setTimeout(func, delay_sec * 1000); }

        const loader = new THREE.GLTFLoader();

        function load_avatar(filename) {
            document.getElementById('subtitle').innerText = "Φόρτωση " + filename + "...";
            if (currentModel) scene.remove(currentModel);
            
            r_shoulder = l_shoulder = r_elbow = l_elbow = r_wrist = l_wrist = null;
            r_fingers = []; l_fingers = []; r_joints_all = {};

            loader.load(filename, function(gltf) {
                currentModel = gltf.scene;
                currentModel.position.set(0, -0.5, 0);
                scene.add(currentModel);

                function bind_joint(bone_name) {
                    let found = null;
                    currentModel.traverse((node) => {
                        if (node.isMesh && node.name.toLowerCase().includes('cube')) {
                            node.visible = false;
                        }
                        if (node.isBone && node.name.endsWith(bone_name)) {
                            found = node;
                        }
                    });
                    return found;
                }

                r_shoulder = bind_joint(`RightArm`);
                r_elbow    = bind_joint(`RightForeArm`);
                r_wrist    = bind_joint(`RightHand`);
                l_shoulder = bind_joint(`LeftArm`);
                l_elbow    = bind_joint(`LeftForeArm`);
                l_wrist    = bind_joint(`LeftHand`);

                const finger_names = ['Index', 'Middle', 'Ring', 'Pinky', 'Thumb'];
                finger_names.forEach(f => {
                    ['1', '2', '3'].forEach(s => {
                        let rj = bind_joint(`RightHand${f}${s}`);
                        if (rj) {
                            if (f === 'Index') r_joints_all[`Index${s}`] = rj; 
                            r_joints_all[`${f}${s}`] = rj;
                            if (s === '1' && f !== 'Thumb') r_fingers.push(rj);
                        }
                    });
                    let lj = bind_joint(`LeftHand${f}1`);
                    if (lj && f !== 'Thumb') l_fingers.push(lj);
                });

                is_busy = false;
                setup_a_pose(0.01);
                document.getElementById('subtitle').innerText = "Σύστημα Έτοιμο!";
                document.getElementById('subtitle').style.color = "#333";
            }, undefined, function(error) {
                document.getElementById('subtitle').innerText = "ΣΦΑΛΜΑ: Το αρχείο " + filename + " δεν βρέθηκε!";
                document.getElementById('subtitle').style.color = "red";
            });
        }

        document.getElementById('avatar-select').addEventListener('change', (e) => {
            load_avatar(e.target.value);
        });

        // Μόλις αλλάζεις Mode, θα ξαναπαίρνει την αρχική στάση για να βλέπεις αν είναι σωστή!
        document.getElementById('axis-select').addEventListener('change', () => {
            setup_a_pose(0.5);
        });
        
        load_avatar('rhea.glb');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        function setup_a_pose(speed = 0.5) {
            hprInterval(r_shoulder, 0, 65, 0, speed);
            hprInterval(r_elbow, 0, 0, 0, speed);
            hprInterval(r_wrist, 0, 0, 0, speed);
            hprInterval(l_shoulder, 0, 65, 0, speed);
            hprInterval(l_elbow, 0, 0, 0, speed);
            hprInterval(l_wrist, 0, 0, 0, speed);
            Object.values(r_joints_all).forEach(j => hprInterval(j, 0, 0, 0, speed));
            l_fingers.forEach(j => hprInterval(j, 0, 0, 0, speed));
        }

        function finalize_gesture() {
            last_activity_time = Date.now();
            invoke(() => { is_busy = false; }, 0.4);
        }

        function animate_fingers(state = "close", count = 2) {
            if (count <= 0) return;
            if (state === "close") {
                r_fingers.forEach(f => hprInterval(f, 0, 0, 45, 0.2));
                l_fingers.forEach(f => hprInterval(f, 0, 0, -45, 0.2));
                invoke(() => animate_fingers("open", count), 0.25);
            } else {
                r_fingers.forEach(f => hprInterval(f, 0, 0, 0, 0.2));
                l_fingers.forEach(f => hprInterval(f, 0, 0, 0, 0.2));
                invoke(() => animate_fingers("close", count - 1), 0.25);
            }
        }

        function part_2_finish() {
            hprInterval(r_shoulder, -40, 35, 100, 0.55);
            hprInterval(l_shoulder, 40, 35, -100, 0.55);
            hprInterval(r_elbow, 20, -25, 30, 0.55);
            hprInterval(l_elbow, -20, -25, -30, 0.55);
            hprInterval(r_wrist, 20, 30, 100, 0.55);
            hprInterval(l_wrist, -20, 30, -100, 0.55);
            invoke(() => animate_fingers("close", 2), 0.4);
            invoke(finalize_gesture, 1.4);
        }

        function gesture_efcharisto() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -50, 30, 50, 0.45);
                hprInterval(r_elbow, -90, -110, 0, 0.45);
                hprInterval(r_wrist, 100, 30, 0, 0.45);
                invoke(part_2_finish, 0.8);
            }
        }

        function shake_index(state = "bend", count = 2) {
            if (count <= 0) return;
            if (state === "bend") {
                ['1', '2', '3'].forEach(s => { let key = `Index${s}`; if(r_joints_all[key]) hprInterval(r_joints_all[key], 0, 40, 0, 0.1); });
                invoke(() => shake_index("straight", count), 0.15);
            } else {
                ['1', '2', '3'].forEach(s => { let key = `Index${s}`; if(r_joints_all[key]) hprInterval(r_joints_all[key], 0, 0, 0, 0.1); });
                invoke(() => shake_index("bend", count - 1), 0.15);
            }
            if (count === 1 && state === "straight") invoke(finalize_gesture, 0.2);
        }

        function animate_fist_close() {
            hprInterval(r_wrist, 15, -60, 100, 0.15);
            for (let name in r_joints_all) {
                let joint = r_joints_all[name];
                if (name.includes('Thumb')) {
                    if (name.includes('1')) hprInterval(joint, -40, 40, 0, 0.15);
                    else hprInterval(joint, 0, 50, 0, 0.15);
                } else if (name.includes('Index')) {
                    hprInterval(joint, 0, 0, 0, 0.15);
                } else {
                    hprInterval(joint, 0, 110, 0, 0.15);
                }
            }
            invoke(() => shake_index("bend", 2), 0.3);
        }

        function mouza_action() {
            hprInterval(r_wrist, 0, -80, 100, 0.2);
            r_fingers.forEach(f => hprInterval(f, 0, 0, -40, 0.15));
            invoke(animate_fist_close, 0.1);
        }

        function gesture_kalimera() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -40, 35, 100, 0.3);
                hprInterval(r_elbow, 20, -25, 30, 0.3);
                hprInterval(r_wrist, 20, 30, 100, 0.3);
                invoke(mouza_action, 0.8);
            }
        }

        function shake_hand_mesimeri(state = "out", count = 2) {
            if (count <= 0) return;
            if (state === "out") {
                hprInterval(r_shoulder, -42, 33, 102, 0.15);
                hprInterval(r_elbow, 10, -32, 30, 0.15);
                hprInterval(r_wrist, 20, 15, 100, 0.15);
                invoke(() => shake_hand_mesimeri("in", count), 0.18);
            } else {
                hprInterval(r_shoulder, -45, 32, 105, 0.15);
                hprInterval(r_elbow, 0, -40, 30, 0.15);
                hprInterval(r_wrist, 20, -2, 100, 0.15);
                invoke(() => shake_hand_mesimeri("out", count - 1), 0.18);
            }
            if (count === 1 && state === "in") invoke(finalize_gesture, 0.2);
        }

        function mesimeri_chin_action() {
            hprInterval(r_shoulder, -45, 32, 105, 0.4);
            hprInterval(r_elbow, 0, -40, 30, 0.4);
            hprInterval(r_wrist, 20, -2, 100, 0.4);
            invoke(() => shake_hand_mesimeri("out", 2), 0.42);
        }

        function gesture_kalo_mesimeri() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -40, 35, 100, 0.5);
                hprInterval(r_elbow, 20, -25, 30, 0.5);
                hprInterval(r_wrist, 20, 30, 100, 0.5);
                invoke(mesimeri_chin_action, 0.8);
            }
        }

        function wave_action(state = "right", count = 3) {
            if (count <= 0) { invoke(finalize_gesture, 0.2); return; }
            if (state === "right") {
                hprInterval(r_wrist, 0, -110, 120, 0.2);
                invoke(() => wave_action("left", count), 0.2);
            } else {
                hprInterval(r_wrist, 0, -110, 60, 0.2);
                invoke(() => wave_action("right", count - 1), 0.2);
            }
        }

        function gesture_geia() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -40, 35, 100, 0.4);
                hprInterval(r_elbow, 20, -25, 30, 0.4);
                hprInterval(r_wrist, 0, -110, 90, 0.4);
                invoke(() => wave_action("right", 4), 0.5);
            }
        }

        function circle_onoma(state = "up", count = 3) {
            if (count <= 0) { invoke(finalize_gesture, 0.2); return; }
            let t = 0.15;
            if (state === "up") {
                hprInterval(r_elbow, 20, -20, 30, t); hprInterval(l_elbow, -20, -20, -30, t);
                invoke(() => circle_onoma("out", count), t);
            } else if (state === "out") {
                hprInterval(r_elbow, 30, -10, 30, t); hprInterval(l_elbow, -30, -10, -30, t);
                invoke(() => circle_onoma("down", count), t);
            } else if (state === "down") {
                hprInterval(r_elbow, 20, 0, 30, t); hprInterval(l_elbow, -20, 0, -30, t);
                invoke(() => circle_onoma("in", count), t);
            } else if (state === "in") {
                hprInterval(r_elbow, 10, -10, 30, t); hprInterval(l_elbow, -10, -10, -30, t);
                invoke(() => circle_onoma("up", count - 1), t);
            }
        }

        function phase_2_onoma() {
            hprInterval(r_shoulder, -30, 20, 80, 0.3); hprInterval(l_shoulder, 30, 20, -80, 0.3);
            hprInterval(r_wrist, 0, -90, 90, 0.3); hprInterval(l_wrist, 0, -90, -90, 0.3);
            
            for (let name in r_joints_all) {
                if (!name.includes('Index')) hprInterval(r_joints_all[name], 0, 90, 0, 0.2);
                else hprInterval(r_joints_all[name], 0, 0, 0, 0.2);
            }
            l_fingers.forEach((f, i) => {
                if (i === 0) hprInterval(f, 0, 0, 0, 0.2);
                else hprInterval(f, 0, 0, -90, 0.2);
            });
            invoke(() => circle_onoma("up", 3), 0.35);
        }

        function gesture_onoma() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -20, 20, 80, 0.4);
                hprInterval(r_elbow, 0, 0, 0, 0.4);
                hprInterval(r_wrist, 0, 0, 0, 0.4);
                for (let name in r_joints_all) {
                    if (!name.includes('Index')) hprInterval(r_joints_all[name], 0, 90, 0, 0.3);
                }
                invoke(phase_2_onoma, 0.8);
            }
        }

        function shake_noimatiko(state = "right_fwd", count = 4) {
            if (count <= 0) { invoke(finalize_gesture, 0.2); return; }
            if (state === "right_fwd") {
                hprInterval(r_elbow, 20, -40, 30, 0.15); hprInterval(l_elbow, -20, 0, -30, 0.15);
                invoke(() => shake_noimatiko("left_fwd", count), 0.2);
            } else {
                hprInterval(r_elbow, 20, 0, 30, 0.15); hprInterval(l_elbow, -20, -40, -30, 0.15);
                invoke(() => shake_noimatiko("right_fwd", count - 1), 0.2);
            }
        }

        function phase_2_noimatiko() {
            hprInterval(r_shoulder, -30, 20, 80, 0.3); hprInterval(l_shoulder, 30, 20, -80, 0.3);
            for (let name in r_joints_all) {
                if (!name.includes('Index')) hprInterval(r_joints_all[name], 0, 90, 0, 0.2);
                else hprInterval(r_joints_all[name], 0, 0, 0, 0.2);
            }
            l_fingers.forEach((f, i) => {
                if (i === 0) hprInterval(f, 0, 0, 0, 0.2);
                else hprInterval(f, 0, 0, -90, 0.2);
            });
            invoke(() => shake_noimatiko("right_fwd", 4), 0.35);
        }

        function gesture_noimatiko_onoma() {
            setup_a_pose(0.2);
            is_busy = true;
            if (r_shoulder && r_elbow && r_wrist) {
                hprInterval(r_shoulder, -20, 20, 80, 0.4);
                hprInterval(r_elbow, 0, 0, 0, 0.4);
                hprInterval(r_wrist, 0, 0, 0, 0.4);
                for (let name in r_joints_all) {
                    if (!name.includes('Index')) hprInterval(r_joints_all[name], 0, 90, 0, 0.3);
                }
                invoke(phase_2_noimatiko, 0.8);
            }
        }

        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                let word = gesture_queue.shift();
                
                if (word === "καλό μεσημέρι" || word === "καλο μεσημερι") gesture_kalo_mesimeri();
                else if (word === "καλό" && gesture_queue.length > 0 && (gesture_queue[0] === "μεσημέρι" || gesture_queue[0] === "μεσημερι")) { 
                    gesture_queue.shift(); gesture_kalo_mesimeri(); 
                }
                else if (word === "ευχαριστώ" || word === "ευχαριστω") gesture_efcharisto();
                else if (word === "καλημέρα" || word === "καλημερα") gesture_kalimera();
                else if (word === "μεσημέρι" || word === "μεσημερι") gesture_kalo_mesimeri();
                else if (word === "γεια" || word === "για" || word === "γει" || word === "γι") gesture_geia();
                else if (word === "όνομα" || word === "ονομα") gesture_onoma();
                else if (word === "νοηματικό όνομα" || word === "νοηματικο ονομα") gesture_noimatiko_onoma();
            }

            if (!is_busy && gesture_queue.length === 0 && (Date.now() - last_activity_time > 3000)) {
                setup_a_pose(1.0);
                last_activity_time = Date.now();
            }
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        const subtitle = document.getElementById('subtitle');
        let recognition;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'el-GR';

            recognition.onstart = function() {
                micBtn.classList.add('listening');
                micBtn.innerText = "🛑 Διακοπή Ακρόασης";
                subtitle.innerText = "Ακούω...";
            };

            recognition.onresult = function(event) {
                let text = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                last_activity_time = Date.now();
                
                const mesimeri_vars = ["καλό μεσημέρι", "καλο μεσημερι", "καλό μεσημ", "καλο μεσημ", "καλό μεση", "καλο μεση", "καλό μεσ", "καλο μεσ"];
                mesimeri_vars.forEach(v => { text = text.replace(v, "καλό_μεσημέρι"); });

                const noimatiko_vars = [
                    "ποιο είναι το νοηματικό σου όνομα", "ποιο ειναι το νοηματικο σου ονομα",
                    "ποιο είναι το νοηματικό σου", "ποιο ειναι το νοηματικο σου",
                    "ποιο είναι το νοηματικό", "ποιο ειναι το νοηματικο",
                    "το νοηματικό σου όνομα", "το νοηματικο σου ονομα",
                    "νοηματικό όνομα", "νοηματικο ονομα", "νοηματικό", "νοηματικο",
                    "ποιο είναι το νοημ", "ποιο ειναι το νοημ", "ποιο είναι το νοη", "ποιο ειναι το νοη"
                ];
                noimatiko_vars.forEach(v => { text = text.replace(v, "νοηματικό_όνομα"); });

                const name_phrases = ["ποιο είναι το όνομά σου", "πώς σε λένε", "πώς σας λένε", "πως σε λενε"];
                name_phrases.forEach(phrase => { text = text.replace(phrase, "όνομα"); });
                text = text.replace("όνομά", "όνομα");

                let display_text = [];
                text.split(" ").forEach(w => {
                    let display_word = w.replace("_", " ");
                    display_text.push(display_word);
                    
                    if (w === "καλό_μεσημέρι") gesture_queue.push("καλό μεσημέρι");
                    else if (w === "νοηματικό_όνομα") gesture_queue.push("νοηματικό όνομα");
                    else gesture_queue.push(w);
                });

                subtitle.innerText = `Είπες: "${display_text.join(' ')}"`;
            };

            recognition.onerror = function() {
                micBtn.classList.remove('listening');
                micBtn.innerText = "🎙️ Ενεργοποίηση Μικροφώνου";
            };
            recognition.onend = function() {
                micBtn.classList.remove('listening');
                micBtn.innerText = "🎙️ Ενεργοποίηση Μικροφώνου";
            };
        }

        let isListening = false;
        micBtn.addEventListener('click', () => {
            if (!isListening) { recognition.start(); isListening = true; } 
            else { recognition.stop(); isListening = false; }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Total Finger Control Debugger</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 22px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 380px;
        }
        .controls { pointer-events: auto; }
        button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: none; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button.listening { background-color: #f44336; }
        select { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white;}

        /* --- CSS ΓΙΑ ΤΟ ΠΑΝΙΣΧΥΡΟ ΕΡΓΑΛΕΙΟ ΔΟΚΙΜΗΣ ΔΑΚΤΥΛΩΝ --- */
        #debug-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.98);
            padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: sans-serif; pointer-events: auto; width: 320px;
            max-height: 90vh; overflow-y: auto; z-index: 1000;
        }
        #debug-panel h2 { margin-top: 0; font-size: 18px; color: #333; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 5px;}
        #debug-panel h3 { font-size: 14px; margin-bottom: 5px; color: #555;}
        .debug-select { width: 100%; padding: 8px; margin-bottom: 10px; font-size: 14px;}
        .slider-group { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee;}
        .slider-group label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-bottom: 5px;}
        .slider-group input { width: 100%; margin: 0; }
        .val-display { float: right; color: #2196F3; font-weight: bold;}
        .debug-btns { display: flex; gap: 5px; }
        .reset-btn { flex: 1; background: #FF9800; font-size: 14px; padding: 10px; }
        .export-btn { flex: 1; background: #2196F3; font-size: 14px; padding: 10px; }
        #export-area { width: 100%; height: 100px; margin-top: 10px; display: none; font-family: monospace; font-size: 11px;}
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="debug-panel">
        <h2>🛠️ Εργαλείο Δακτύλων</h2>
        
        <h3>1. Επιλογή Χεριού</h3>
        <select id="hand-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="right">▶️ Δεξί Χέρι</option>
            <option value="left">◀️ Αριστερό Χέρι</option>
        </select>

        <h3>2. Επιλογή Δακτύλου</h3>
        <select id="finger-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="thumb">👍 Αντίχειρας (Thumb)</option>
            <option value="index" selected>☝️ Δείκτης (Index)</option>
            <option value="middle">🖕 Μεσαίος (Middle)</option>
            <option value="ring">💍 Παράμεσος (Ring)</option>
            <option value="pinky">🤏 Μικρός (Pinky)</option>
        </select>

        <h3>3. Επιλογή Άρθρωσης</h3>
        <select id="joint-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="1" selected>🦴 Βάση (MCP)</option>
            <option value="2">🦴 Μέση (PIP)</option>
            <option value="3">🦴 Άκρη (DIP)</option>
        </select>
        
        <div class="slider-group">
            <label>Άξονας X: <span id="valX" class="val-display">0</span>°</label>
            <input type="range" id="sliderX" min="-180" max="180" value="0" oninput="updateBoneRotation()">
            
            <label>Άξονας Y: <span id="valY" class="val-display">0</span>°</label>
            <input type="range" id="sliderY" min="-180" max="180" value="0" oninput="updateBoneRotation()">
            
            <label>Άξονας Z: <span id="valZ" class="val-display">0</span>°</label>
            <input type="range" id="sliderZ" min="-180" max="180" value="0" oninput="updateBoneRotation()">
        </div>
        
        <div class="debug-btns">
            <button class="reset-btn" onclick="resetCurrentFinger()">🔄 Μηδενισμός</button>
            <button class="export-btn" onclick="exportData()">📥 Εξαγωγή</button>
        </div>
        <textarea id="export-area" readonly placeholder="Τα JSON δεδομένα θα εμφανιστούν εδώ..."></textarea>
    </div>

    <div id="ui-layer">
        <div id="subtitle">Μικρόφωνο Κλειστό</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // === THREE.JS SETUP (ΚΛΕΙΔΩΜΕΝΟ) ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        let last_trigger_time = 0; 
        const deg = (d) => d * (Math.PI / 180);
        const rad = (r) => r * (180 / Math.PI); 

        // === ΔΟΜΗ ΔΕΔΟΜΕΝΩΝ ΓΙΑ ΤΟ DEBUGGING ===
        const fingerNames = ['thumb', 'index', 'middle', 'ring', 'pinky'];
        const jointNames = ['1', '2', '3'];
        let debugAngles = { right: {}, left: {} };

        ['right', 'left'].forEach(side => {
            fingerNames.forEach(f => {
                debugAngles[side][f] = {};
                jointNames.forEach(j => { debugAngles[side][f][j] = {x:0, y:0, z:0}; });
            });
        });

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = { r_fingers: {}, l_fingers: {} }; 
            
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);
                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                        if (b.endsWith('righthand')) bones.r_wrist = n;
                        if (b.endsWith('lefthand')) bones.l_wrist = n;

                        fingerNames.forEach(finger => {
                            jointNames.forEach(joint => {
                                if (b.includes('righthand' + finger) && b.endsWith(finger + joint)) bones.r_fingers[finger + joint] = n;
                                if (b.includes('lefthand' + finger) && b.endsWith(finger + joint)) bones.l_fingers[finger + joint] = n;
                            });
                        });
                    }
                });
                resetPose(0.1); // Αυτό θα φέρει τα χέρια στη σταθερή ψηλή πόζα
                loadCurrentAngles(); 
            });
        }

        // === ΣΥΝΑΡΤΗΣΕΙΣ ΛΟΓΙΚΗΣ ΤΟΥ DEBUG PANEL ===
        function updateBoneRotation() {
            if (!currentModel) return;
            is_busy = true; 

            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            const joint = document.getElementById('joint-select').value;
            
            const x = parseFloat(document.getElementById('sliderX').value);
            const y = parseFloat(document.getElementById('sliderY').value);
            const z = parseFloat(document.getElementById('sliderZ').value);
            
            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            debugAngles[side][finger][joint] = {x, y, z};

            const boneMap = side === 'right' ? bones.r_fingers : bones.l_fingers;
            const boneName = finger + joint;
            
            if (boneMap[boneName]) {
                boneMap[boneName].rotation.x = deg(x);
                boneMap[boneName].rotation.y = deg(y);
                boneMap[boneName].rotation.z = deg(z);
            }
        }

        function loadCurrentAngles() {
            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            const joint = document.getElementById('joint-select').value;
            const angles = debugAngles[side][finger][joint];

            document.getElementById('sliderX').value = angles.x;
            document.getElementById('sliderY').value = angles.y;
            document.getElementById('sliderZ').value = angles.z;
            
            document.getElementById('valX').innerText = angles.x;
            document.getElementById('valY').innerText = angles.y;
            document.getElementById('valZ').innerText = angles.z;
        }

        function resetCurrentFinger() {
            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            const boneMap = side === 'right' ? bones.r_fingers : bones.l_fingers;

            jointNames.forEach(joint => {
                debugAngles[side][finger][joint] = {x:0, y:0, z:0};
                const boneName = finger + joint;
                if(boneMap[boneName]) boneMap[boneName].rotation.set(0,0,0);
            });
            loadCurrentAngles(); 
        }

        function exportData() {
            const area = document.getElementById('export-area');
            area.style.display = 'block';
            area.value = "// COPY ΚΑΙ PASTE ΑΥΤΟ ΤΟ ΚΕΙΜΕΝΟ ΣΤΟ CHAT:\n" + JSON.stringify(debugAngles, null, 2);
            area.select();
        }

        // === ΣΤΑΘΕΡΗ ΠΟΖΑ ΧΕΡΙΩΝ (ΨΗΛΑ ΣΤΟ ΣΤΕΡΝΟ) ===
        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            is_busy = false; 
            const area = document.getElementById('export-area');
            if(area) area.style.display = 'none';

            // --- ΑΥΤΗ ΕΙΝΑΙ Η ΣΤΑΘΕΡΗ ΠΟΖΑ ΠΟΥ ΖΗΤΗΣΕΣ (Απο το "ευχαριστώ") ---
            // Δεξί χέρι
            gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(-27), z: deg(-24), duration: speed });
            gsap.to(bones.r_elbow.rotation, { x: deg(91), y: deg(-24), z: deg(-107), duration: speed });
            
            // Αριστερό χέρι
            gsap.to(bones.l_shoulder.rotation, { x: deg(52), y: deg(27), z: deg(24), duration: speed });
            gsap.to(bones.l_elbow.rotation, { x: deg(91), y: deg(24), z: deg(107), duration: speed });
            
            // Μηδενισμός καρπών
            if(bones.r_wrist) gsap.to(bones.r_wrist.rotation, {x:0, y:0, z:0, duration: speed});
            if(bones.l_wrist) gsap.to(bones.l_wrist.rotation, {x:0, y:0, z:0, duration: speed});

            // Μηδενισμός δακτύλων (για να τα φτιάξεις εσύ)
            Object.values(bones.r_fingers).concat(Object.values(bones.l_fingers)).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        // === ΛΟΓΙΚΗ naturalCurl (ΑΜΕΤΑΒΛΗΤΟ) ===
        function naturalCurl(side, amount, skipIndex = false, duration = 0.5) {
            if (!currentModel) return;
            const boneMap = side === 'r' ? bones.r_fingers : bones.l_fingers;
            const dir = side === 'r' ? -1 : 1; 
            const boneArray = Object.values(boneMap);

            boneArray.forEach(f => {
                const name = f.name.toLowerCase();
                if (skipIndex && name.includes('index')) return;
                let mult = 0.9; 
                if (name.includes('2')) mult = 1.1; 
                if (name.includes('3')) mult = 0.6; 
                gsap.to(f.rotation, { z: deg(amount * dir * mult), duration: duration, ease: "power2.out" });
            });
        }

        // === ΚΙΝΗΣΕΙΣ (ΚΛΕΙΔΩΜΕΝΕΣ ΩΣ ΕΧΟΥΝ) ===

        function gesture_efcharisto() {
            is_busy = true;
            // Πρώτη φάση (κατέβασμα)
            gsap.to(bones.r_shoulder.rotation, { x: deg(27), y: deg(-35), z: deg(-26), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(-26), z: deg(-107), duration: 0.5 });
            setTimeout(() => {
                // Δεύτερη φάση (ανέβασμα - Πόζα Φωτογραφίας)
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(-27), z: deg(-24), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(91), y: deg(-24), z: deg(-107), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(52), y: deg(27), z: deg(24), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(91), y: deg(24), z: deg(107), duration: 0.5 });
                const pulse = gsap.timeline({ repeat: 2, onComplete: finalize_gesture });
                
                pulse.to({}, { duration: 0.1, onStart: () => { naturalCurl('r', 75); naturalCurl('l', 75); } })
                     .to({}, { duration: 0.35 })
                     .to({}, { duration: 0.1, onStart: () => { naturalCurl('r', 25); naturalCurl('l', 25); } })
                     .to({}, { duration: 0.35 });
            }, 600);
        }

        function gesture_kalimera() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_wrist.rotation, { y: deg(-65), duration: 0.3 });
                naturalCurl('r', 85, true); 
                const indexBone = bones.r_fingers['index1']; 
                const indexBone2 = bones.r_fingers['index2']; 
                const indexBone3 = bones.r_fingers['index3']; 
                const flickBones = [indexBone, indexBone2, indexBone3].filter(b=>b);

                const flick = gsap.timeline({ repeat: 1, onComplete: finalize_gesture });
                flick.to(flickBones.map(b=>b.rotation), { z: deg(-60), duration: 0.15, ease: "power1.inOut" })
                     .to(flickBones.map(b=>b.rotation), { z: deg(-10), duration: 0.15, ease: "power1.inOut" });
            }, 600);
        }

        function gesture_mesimeri() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(7), z: deg(-34), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(21), y: deg(-44), z: deg(-121), duration: 0.5 });
                const tl = gsap.timeline({ repeat: 2, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { y: deg(40), duration: 0.4 }).to(bones.r_wrist.rotation, { y: deg(-40), duration: 0.4 });
            }, 600);
        }

        function gesture_geia() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(11), y: deg(18), z: deg(4), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-10), y: deg(35), z: deg(-128), duration: 0.5 });
            setTimeout(() => {
                const tl = gsap.timeline({ repeat: 4, onComplete: finalize_gesture });
                tl.to(bones.r_wrist.rotation, { z: deg(25), duration: 0.25 }).to(bones.r_wrist.rotation, { z: deg(-25), duration: 0.25 });
            }, 600);
        }

        function gesture_onoma() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(39), y: deg(-24), z: deg(-58), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(46), z: deg(-31), duration: 0.5 });
            naturalCurl('r', 90, true);
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(25), y: deg(7), z: deg(-51), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(59), y: deg(1), z: deg(-48), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(25), y: deg(-7), z: deg(51), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(59), y: deg(1), z: deg(48), duration: 0.5 });
                naturalCurl('l', 90, true);
                let start = Date.now();
                const draw = () => {
                    let el = (Date.now() - start) / 1000;
                    if (el < 3.2) {
                        const r = 0.24;
                        bones.r_wrist.rotation.x = Math.sin(el * 11) * r;
                        bones.r_wrist.rotation.y = Math.cos(el * 11) * r;
                        bones.l_wrist.rotation.x = Math.sin(el * 11) * r;
                        bones.l_wrist.rotation.y = -Math.cos(el * 11) * r;
                        requestAnimationFrame(draw);
                    } else { finalize_gesture(); }
                };
                draw();
            }, 1000);
        }

        function finalize_gesture() { resetPose(); }

        // === ΦΩΝΗΤΙΚΟΣ ΕΛΕΓΧΟΣ (ΑΜΕΤΑΒΛΗΤΟ) ===
        const micBtn = document.getElementById('mic-btn');
        const subtitle = document.getElementById('subtitle');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.continuous = true;
            recognition.interimResults = true; 

            recognition.onresult = (event) => {
                let text = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    text += event.results[i][0].transcript;
                }
                text = text.toLowerCase().trim();
                subtitle.innerText = "Είπες: " + text;

                const now = Date.now();
                if (is_busy || (now - last_trigger_time < 2000)) return;

                if (text.includes("ευχαριστώ") || text.includes("ευχαριστω")) { 
                    last_trigger_time = now; gesture_efcharisto(); 
                }
                else if (text.includes("καλημέρα") || text.includes("καλημερα")) { 
                    last_trigger_time = now; gesture_kalimera(); 
                }
                else if (text.includes("μεσημέρι") || text.includes("μεσημερι")) { 
                    last_trigger_time = now; gesture_mesimeri(); 
                }
                else if (text.includes("γεια") || text.includes("χαίρετε")) { 
                    last_trigger_time = now; gesture_geia(); 
                }
                else if (text.includes("όνομα") || text.includes("ποιο") || text.includes("ειναι") || text.includes("όνομά") || text.includes("σου")) { 
                    last_trigger_time = now; gesture_onoma(); 
                }
            };
            recognition.onend = () => { if(isListening) recognition.start(); };
        }

        micBtn.onclick = () => {
            if (!isListening) {
                recognition.start();
                isListening = true;
                micBtn.innerText = "🛑 Κλείσιμο";
                micBtn.classList.add('listening');
                subtitle.innerText = "Ακούω...";
            } else {
                isListening = false;
                recognition.stop();
                micBtn.innerText = "🎙️ Ενεργοποίηση";
                micBtn.classList.remove('listening');
                subtitle.innerText = "Μικρόφωνο Κλειστό";
            }
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

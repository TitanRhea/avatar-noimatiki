<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Greek Sign Language</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 320px;
        }
        .controls { pointer-events: auto; }
        select, button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: 1px solid #ddd; background: white; transition: 0.3s;
        }
        button:hover { background: #f9f9f9; transform: translateY(-2px); }
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Σύστημα Έτοιμο</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        // ΚΑΜΕΡΑ: Ρυθμισμένη ψηλότερα για να βλέπει το αβατάρ στο σωστό ύψος αμέσως
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3.8); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        // ΕΣΤΙΑΣΗ: Κοιτάμε στο ύψος του στήθους/προσώπου
        controls.target.set(0, 1.2, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false, gesture_queue = [], last_activity_time = Date.now();
        const deg = (d) => d * (Math.PI / 180);

        // ΚΛΕΙΔΩΜΕΝΗ ΠΟΖΑ (A-POSE)
        const pose = { x: 0, y: 0, z: -75 };

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                // ΤΟΠΟΘΕΤΗΣΗ: Ανέβηκε στο -1.3 για να μην κρύβεται από το UI
                currentModel.position.set(0, -1.3, 0); 
                currentModel.scale.set(1.0, 1.0, 1.0); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                resetPose(0.1);
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            bones.r_shoulder.rotation.order = 'YXZ';
            bones.l_shoulder.rotation.order = 'YXZ';
            
            gsap.to(bones.r_shoulder.rotation, { x: deg(pose.x), y: deg(pose.y), z: deg(pose.z), duration: speed });
            gsap.to(bones.l_shoulder.rotation, { x: deg(pose.x), y: deg(-pose.y), z: deg(-pose.z), duration: speed });
            
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
        }

        // --- ΚΙΝΗΣΕΙΣ ---
        function gesture_kalimera() {
            is_busy = true;
            // Κίνηση προς τα εμπρός και πάνω
            gsap.to(bones.r_shoulder.rotation, { x: deg(20), y: deg(40), z: deg(-20), duration: 0.5 });
            setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 1200);
        }

        function gesture_geia() {
            is_busy = true;
            // Χαιρετισμός
            gsap.to(bones.r_shoulder.rotation, { x: deg(0), y: deg(60), z: deg(-50), duration: 0.4 });
            setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 1000);
        }

        // --- ΜΗΧΑΝΙΣΜΟΣ ΦΩΝΗΣ ---
        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                const w = gesture_queue.shift();
                if (w.includes("καλημέρα")) gesture_kalimera();
                else if (w.includes("γεια")) gesture_geia();
            }
            if (!is_busy && Date.now() - last_activity_time > 4000) resetPose(1.0);
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'el-GR'; rec.continuous = true;
        
        rec.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = t;
            t.split(" ").forEach(word => gesture_queue.push(word));
            last_activity_time = Date.now();
        };

        micBtn.onclick = () => { 
            rec.start(); 
            micBtn.classList.add('listening');
            micBtn.innerText = "🛑 Ακούω...";
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Calibration Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: auto;
        }
        #subtitle {
            font-size: 22px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 380px; pointer-events: none;
        }
        .controls { display: flex; justify-content: center; gap: 10px; align-items: center; pointer-events: auto;}
        button { 
            font-size: 16px; padding: 12px 25px; border-radius: 10px; 
            cursor: pointer; border: none; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        select { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white;}
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Μικρόφωνο Κλειστό</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="updated_model.glb">Avatar: Rhea (Νέο Μοντέλο)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        const deg = (d) => d * (Math.PI / 180);
        
        // Η Α-Pose
        const basePose = { x: 54, y: 30, z: 17 };
        const VOWEL_OPEN = { 'α': 115, 'ε': 105, 'η': 105, 'ι': 100, 'ο': 110, 'υ': 100, 'ω': 110 };

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        function loadAvatar(file) {
            const finalPath = file + "?v=" + Date.now();
            if (currentModel) scene.remove(currentModel);
            bones = { r_fingers: [], l_fingers: [], r_joints: {}, l_joints: {} }; 
            
            loader.load(finalPath, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);
                
                currentModel.traverse(n => {
                    if (n.isMesh && (n.name.toLowerCase().includes('cube') || n.name.toLowerCase().includes('box'))) n.visible = false;
                    
                    if (n.isBone) {
                        const bName = n.name;
                        const bLower = bName.toLowerCase();
                        
                        // Στόμα
                        if (bLower.includes('jaw')) bones.jaw = n;
                        
                        // Άκρα
                        if (bName === 'mixamorig6RightArm') bones.r_shoulder = n;
                        if (bName === 'mixamorig6RightForeArm') bones.r_elbow = n;
                        if (bName === 'mixamorig6RightHand') bones.r_wrist = n;

                        if (bName === 'mixamorig6LeftArm') bones.l_shoulder = n;
                        if (bName === 'mixamorig6LeftForeArm') bones.l_elbow = n;
                        if (bName === 'mixamorig6LeftHand') bones.l_wrist = n;

                        // Δάχτυλα
                        const match = bLower.match(/(thumb|index|middle|ring|pinky)(\d)/);
                        if (match) {
                            if (bLower.includes('right')) {
                                bones.r_joints[match[0]] = n;
                                bones.r_fingers.push(n);
                            } else if (bLower.includes('left')) {
                                bones.l_joints[match[0]] = n;
                                bones.l_fingers.push(n);
                            }
                        }
                    }
                });
                
                setTimeout(() => {
                    resetPose(0.1);
                    if (bones.jaw) bones.jaw.rotation.x = deg(90);
                    document.getElementById('subtitle').innerText = "Rhea: Calibration Mode Έτοιμο!";
                }, 400);
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(basePose.z), duration: speed });
            if (bones.l_shoulder) gsap.to(bones.l_shoulder.rotation, { x: deg(basePose.x), y: deg(-basePose.y), z: deg(-basePose.z), duration: speed });
            [bones.r_elbow, bones.l_elbow, bones.r_wrist, bones.l_wrist].forEach(b => { if(b) gsap.to(b.rotation, { x: 0, y: 0, z: 0, duration: speed }); });
            bones.r_fingers.concat(bones.l_fingers).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        function speakWord(word, total_time = 1.5) {
            if (!bones.jaw) return;
            const vowels = [...word.toLowerCase()].filter(c => VOWEL_OPEN[c]);
            const step_time = total_time / (vowels.length || 1);
            const tl = gsap.timeline();
            vowels.forEach(v => {
                tl.to(bones.jaw.rotation, { x: deg(VOWEL_OPEN[v]), duration: step_time / 2, ease: "sine.inOut" })
                  .to(bones.jaw.rotation, { x: deg(90), duration: step_time / 2, ease: "sine.inOut" });
            });
        }

        function finalize_gesture() { 
            resetPose(); 
            setTimeout(() => { is_busy = false; }, 600); 
        }


        // ==========================================
        // === CALIBRATION MODE (ΠΕΣ "ΔΟΚΙΜΗ") ===
        // ==========================================
        
        function gesture_dokimi() {
            is_busy = true; 
            speakWord("Δοκιμή", 1.0);

            // --- ΔΕΞΙ ΧΕΡΙ ---
            // Ώμος, Αγκώνας, Καρπός
            if(bones.r_shoulder) gsap.to(bones.r_shoulder.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });
            if(bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });
            if(bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });

            // Δάχτυλα Δεξιού Χεριού (thumb, index, middle, ring, pinky) -> 1, 2, 3 είναι οι φάλαγγες
            ['thumb', 'index', 'middle', 'ring', 'pinky'].forEach(f => {
                [1,2,3].forEach(num => {
                    if(bones.r_joints[f+num]) {
                        gsap.to(bones.r_joints[f+num].rotation, { 
                            x: deg(0), // <- Βάλε μοίρες εδώ για να λυγίσουν
                            y: deg(0), 
                            z: deg(0), 
                            duration: 0.5 
                        });
                    }
                });
            });

            // --- ΑΡΙΣΤΕΡΟ ΧΕΡΙ ---
            // Ώμος, Αγκώνας, Καρπός
            if(bones.l_shoulder) gsap.to(bones.l_shoulder.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });
            if(bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });
            if(bones.l_wrist) gsap.to(bones.l_wrist.rotation, { x: deg(0), y: deg(0), z: deg(0), duration: 0.5 });

            // Δάχτυλα Αριστερού Χεριού
            ['thumb', 'index', 'middle', 'ring', 'pinky'].forEach(f => {
                [1,2,3].forEach(num => {
                    if(bones.l_joints[f+num]) {
                        gsap.to(bones.l_joints[f+num].rotation, { 
                            x: deg(0), // <- Βάλε μοίρες εδώ για να λυγίσουν
                            y: deg(0), 
                            z: deg(0), 
                            duration: 0.5 
                        });
                    }
                });
            });

            // Κρατάει την πόζα για 5 δευτερόλεπτα και μετά επανέρχεται
            setTimeout(finalize_gesture, 5000); 
        }

        // ==========================================


        // --- ΦΩΝΗΤΙΚΟΣ ΕΛΕΓΧΟΣ ---
        const micBtn = document.getElementById('mic-btn');
        const subtitle = document.getElementById('subtitle');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.continuous = false; 
            recognition.interimResults = false; 

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase().trim();
                subtitle.innerText = "Είπες: " + text;

                if (text.includes("δοκιμή") || text.includes("δοκιμη")) {
                    if (!is_busy) gesture_dokimi();
                } else {
                    speakWord(text);
                }
            };
            
            recognition.onerror = (event) => { 
                if (event.error !== 'no-speech') {
                    isListening = false; 
                    micBtn.classList.remove('listening'); 
                    micBtn.innerText = "🎙️ Ενεργοποίηση"; 
                }
            };
            
            recognition.onend = () => { 
                if (isListening) {
                    try { recognition.start(); } catch(e) {}
                } 
            };
        }

        micBtn.onclick = () => {
            if (!isListening) {
                try { recognition.start(); } catch(e) {}
                isListening = true;
                micBtn.innerText = "🛑 Κλείσιμο";
                micBtn.classList.add('listening');
                subtitle.innerText = "Ακούω (Πες 'Δοκιμή')...";
            } else {
                isListening = false;
                recognition.stop();
                micBtn.innerText = "🎙️ Ενεργοποίηση";
                micBtn.classList.remove('listening');
                subtitle.innerText = "Μικρόφωνο Κλειστό";
            }
        };

        loadAvatar('updated_model.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

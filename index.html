<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avatar Live Calibration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: sans-serif; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #calibration-panel {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: auto;
            border: 2px solid #2196F3; max-height: 90vh; overflow-y: auto;
        }

        h3 { margin: 0 0 15px 0; text-align: center; color: #333; }
        select { width: 100%; font-size: 16px; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; }
        
        .slider-group { margin-bottom: 15px; }
        .slider-group label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type=range] { width: 100%; margin: 0; }
        
        #log-panel {
            background: #222; color: #0f0; padding: 10px; border-radius: 8px;
            font-family: monospace; font-size: 14px; margin-top: 15px;
            white-space: pre-wrap; word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="calibration-panel">
        <h3>Ρύθμιση Πόζας (Live)</h3>
        
        <select id="bone-select" onchange="loadBoneValues()">
            <optgroup label="Δεξί Χέρι">
                <option value="r_shoulder">Δεξί Ώμος (Shoulder)</option>
                <option value="r_elbow">Δεξί Αγκώνας (Elbow)</option>
                <option value="r_wrist">Δεξί Καρπός (Wrist)</option>
            </optgroup>
            <optgroup label="Δεξιά Δάχτυλα">
                <option value="thumb1">Αντίχειρας (Βάση)</option>
                <option value="thumb2">Αντίχειρας (Μέση)</option>
                <option value="index1">Δείκτης (Βάση)</option>
                <option value="index2">Δείκτης (Μέση)</option>
                <option value="middle1">Μέσος (Βάση)</option>
                <option value="ring1">Παράμεσος (Βάση)</option>
                <option value="pinky1">Μικρό (Βάση)</option>
            </optgroup>
            <optgroup label="Αριστερό Χέρι">
                <option value="l_shoulder">Αριστερός Ώμος (Shoulder)</option>
                <option value="l_elbow">Αριστερός Αγκώνας (Elbow)</option>
                <option value="l_wrist">Αριστερός Καρπός (Wrist)</option>
            </optgroup>
        </select>

        <div class="slider-group">
            <label>Άξονας X (Πάνω/Κάτω) <span id="valX">0°</span></label>
            <input type="range" id="sliderX" min="-180" max="180" value="0" oninput="applyRotation()">
        </div>
        
        <div class="slider-group">
            <label>Άξονας Y (Μέσα/Έξω) <span id="valY">0°</span></label>
            <input type="range" id="sliderY" min="-180" max="180" value="0" oninput="applyRotation()">
        </div>
        
        <div class="slider-group">
            <label>Άξονας Z (Στριφογύρισμα) <span id="valZ">0°</span></label>
            <input type="range" id="sliderZ" min="-180" max="180" value="0" oninput="applyRotation()">
        </div>

        <div id="log-panel">Άλλαξε τις μπάρες για να δεις τους αριθμούς εδώ...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 3.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = { r_joints: {}, l_joints: {} };
        const deg = (d) => d * (Math.PI / 180);
        const radToDeg = (r) => Math.round(r * 180 / Math.PI);
        
        // H A-Pose σου για να ξεκινάει φυσιολογικά
        const basePose = { x: 54, y: 30, z: 17 };

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        loader.load('updated_model.glb?v=' + Date.now(), (gltf) => {
            currentModel = gltf.scene;
            currentModel.position.set(0, 0, 0); 
            currentModel.scale.set(1.1, 1.1, 1.1); 
            scene.add(currentModel);
            
            currentModel.traverse(n => {
                if (n.isMesh && (n.name.toLowerCase().includes('cube') || n.name.toLowerCase().includes('box'))) n.visible = false;
                if (n.isBone) {
                    const bName = n.name;
                    const bLower = bName.toLowerCase();
                    
                    if (bName === 'mixamorig6RightArm') bones.r_shoulder = n;
                    if (bName === 'mixamorig6RightForeArm') bones.r_elbow = n;
                    if (bName === 'mixamorig6RightHand') bones.r_wrist = n;

                    if (bName === 'mixamorig6LeftArm') bones.l_shoulder = n;
                    if (bName === 'mixamorig6LeftForeArm') bones.l_elbow = n;
                    if (bName === 'mixamorig6LeftHand') bones.l_wrist = n;

                    const match = bLower.match(/(thumb|index|middle|ring|pinky)(\d)/);
                    if (match) {
                        if (bLower.includes('right')) bones.r_joints[match[0]] = n;
                        if (bLower.includes('left')) bones.l_joints[match[0]] = n;
                    }
                }
            });
            
            // Βάλε την Α-Pose αρχικά
            if(bones.r_shoulder) bones.r_shoulder.rotation.set(deg(basePose.x), deg(basePose.y), deg(basePose.z));
            if(bones.l_shoulder) bones.l_shoulder.rotation.set(deg(basePose.x), deg(-basePose.y), deg(-basePose.z));
            
            loadBoneValues(); // Φόρτωσε τις τιμές στις μπάρες
        });

        // --- ΛΟΓΙΚΗ ΓΙΑ ΤΙΣ ΜΠΑΡΕΣ (SLIDERS) ---

        function getSelectedBone() {
            let val = document.getElementById('bone-select').value;
            if (bones[val]) return { bone: bones[val], name: val };
            if (bones.r_joints[val]) return { bone: bones.r_joints[val], name: 'r_' + val };
            if (bones.l_joints[val]) return { bone: bones.l_joints[val], name: 'l_' + val };
            return null;
        }

        function loadBoneValues() {
            let selection = getSelectedBone();
            if (selection && selection.bone) {
                let x = radToDeg(selection.bone.rotation.x);
                let y = radToDeg(selection.bone.rotation.y);
                let z = radToDeg(selection.bone.rotation.z);
                
                document.getElementById('sliderX').value = x;
                document.getElementById('sliderY').value = y;
                document.getElementById('sliderZ').value = z;
                
                document.getElementById('valX').innerText = x + "°";
                document.getElementById('valY').innerText = y + "°";
                document.getElementById('valZ').innerText = z + "°";
            }
        }

        let savedPoses = {};

        function applyRotation() {
            let selection = getSelectedBone();
            if (selection && selection.bone) {
                let x = document.getElementById('sliderX').value;
                let y = document.getElementById('sliderY').value;
                let z = document.getElementById('sliderZ').value;
                
                document.getElementById('valX').innerText = x + "°";
                document.getElementById('valY').innerText = y + "°";
                document.getElementById('valZ').innerText = z + "°";

                // Κουνάει το άβαταρ ζωντανά
                selection.bone.rotation.set(deg(x), deg(y), deg(z));
                
                // Αποθηκεύει τη ρύθμιση για να την τυπώσει στο μαύρο κουτί
                savedPoses[selection.name] = `{ x: deg(${x}), y: deg(${y}), z: deg(${z}) }`;
                updateLog();
            }
        }

        function updateLog() {
            let logText = "// Αντέγραψε αυτά τα νούμερα:\n";
            for (let key in savedPoses) {
                logText += key + ": " + savedPoses[key] + "\n";
            }
            document.getElementById('log-panel').innerText = logText;
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

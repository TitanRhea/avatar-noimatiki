<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Εργαστήριο Διόρθωσης</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 26px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 30px; border-radius: 20px; display: inline-block;
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* ΤΟ ΝΕΟ ΠΑΝΕΛ ΓΙΑ ΤΑ SLIDERS ΠΑΝΩ ΑΡΙΣΤΕΡΑ */
        #calibration-panel {
            position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            pointer-events: auto; font-size: 16px;
        }
        .slider-row { margin: 15px 0; }
        input[type="range"] { width: 150px; cursor: pointer; }
        .val-badge { display: inline-block; width: 40px; text-align: right; font-weight: bold; color: #d32f2f; }
        
        select { font-size: 16px; padding: 10px; border-radius: 8px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="calibration-panel">
        <h3 style="margin-top: 0; margin-bottom: 10px;">🛠️ Βρες τη Σωστή Στάση</h3>
        <p style="font-size: 14px; margin-top: 0;">Κούνα τα sliders μέχρι το δεξί χέρι<br>να πέσει φυσιολογικά κάτω.</p>
        
        <select id="avatar-select" style="width: 100%; margin-bottom: 15px;">
            <option value="rhea.glb">Avatar 1: Rhea</option>
            <option value="titan.glb">Avatar 2: Titan</option>
        </select>

        <div class="slider-row">
            Άξονας X: <input type="range" min="-180" max="180" value="0" id="sliderX"> 
            <span class="val-badge" id="valX">0</span>°
        </div>
        <div class="slider-row">
            Άξονας Y: <input type="range" min="-180" max="180" value="0" id="sliderY"> 
            <span class="val-badge" id="valY">0</span>°
        </div>
        <div class="slider-row">
            Άξονας Z: <input type="range" min="-180" max="180" value="0" id="sliderZ"> 
            <span class="val-badge" id="valZ">0</span>°
        </div>
    </div>

    <div id="ui-layer">
        <div id="subtitle">Φόρτωση...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(240/255, 230/255, 220/255);
        
        // --- 1. ΔΙΟΡΘΩΣΗ ΥΨΟΥΣ: Η Κάμερα βλέπει πλέον στο στήθος, άρα το Avatar φαίνεται ψηλότερα! ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, 4.5); // Τραβήχτηκε πιο πίσω

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.8, 0); // Το κέντρο εστίασης κατέβηκε (για να ανέβει το Avatar)
        controls.update();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        let currentModel = null;
        let r_shoulder = null;
        
        const deg = (d) => d * (Math.PI / 180);

        const loader = new THREE.GLTFLoader();

        function load_avatar(filename) {
            document.getElementById('subtitle').innerText = "Φόρτωση " + filename + "...";
            if (currentModel) scene.remove(currentModel);

            loader.load(filename, function(gltf) {
                currentModel = gltf.scene;
                currentModel.position.set(0, -0.5, 0);
                scene.add(currentModel);

                // Βρίσκει τον δεξί ώμο
                currentModel.traverse((node) => {
                    if (node.isMesh && node.name.toLowerCase().includes('cube')) node.visible = false;
                    if (node.isBone && node.name.endsWith('RightArm')) r_shoulder = node;
                });

                // Μηδενισμός Sliders σε κάθε φόρτωση
                document.getElementById('sliderX').value = 0; document.getElementById('valX').innerText = "0";
                document.getElementById('sliderY').value = 0; document.getElementById('valY').innerText = "0";
                document.getElementById('sliderZ').value = 0; document.getElementById('valZ').innerText = "0";
                
                if (r_shoulder) r_shoulder.rotation.set(0,0,0);

                document.getElementById('subtitle').innerText = "Όλα Έτοιμα! Κούνα τα Sliders.";
            });
        }

        document.getElementById('avatar-select').addEventListener('change', (e) => load_avatar(e.target.value));
        load_avatar('rhea.glb');

        // --- 2. ΣΥΝΔΕΣΗ ΤΩΝ SLIDERS ΜΕ ΤΟΝ ΩΜΟ ---
        function updateShoulder() {
            if (!r_shoulder) return;
            let x = document.getElementById('sliderX').value;
            let y = document.getElementById('sliderY').value;
            let z = document.getElementById('sliderZ').value;
            
            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;

            // Εφαρμογή της περιστροφής στο κόκκαλο σε πραγματικό χρόνο
            r_shoulder.rotation.set(deg(x), deg(y), deg(z));
        }

        document.getElementById('sliderX').addEventListener('input', updateShoulder);
        document.getElementById('sliderY').addEventListener('input', updateShoulder);
        document.getElementById('sliderZ').addEventListener('input', updateShoulder);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Final Positioning</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px; border-radius: 15px; display: inline-block;
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls { pointer-events: auto; background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 12px; display: inline-block; }
        select, button { font-size: 16px; padding: 8px 15px; margin: 5px; border-radius: 6px; cursor: pointer; }
        #mic-btn { background-color: #4CAF50; color: white; border: none; }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="subtitle">Σύστημα Έτοιμο</div><br>
        <div class="controls">
            <select id="avatar-select">
                <option value="rhea.glb">Avatar 1: Rhea</option>
                <option value="titan.glb">Avatar 2: Titan</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        // ΚΑΜΕΡΑ: Εστίαση στο πάνω μέρος του σώματος
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 2.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.4, 0); // Κοιτάζει το πρόσωπο
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, is_busy = false, bones = {}, gesture_queue = [];
        const loader = new THREE.GLTFLoader();

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            loader.load(file, (gltf) => {
                currentModel = gltf.scene;
                // ΤΟΠΟΘΕΤΗΣΗ: Ανεβάζουμε το μοντέλο ώστε το στήθος να είναι στο κέντρο
                currentModel.position.set(0, -0.8, 0); 
                currentModel.scale.set(1.5, 1.5, 1.5);
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                resetPose(0.1);
            });
        }

        // RESET ΜΕ ΑΠΕΥΘΕΙΑΣ ΕΛΕΓΧΟ QUATERNION (Παρακάμπτει τα προβλήματα αξόνων)
        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            // Δεξί χέρι κάτω (A-Pose)
            gsap.to(bones.r_shoulder.quaternion, { x: 0.4, y: 0, z: -0.6, w: 0.7, duration: speed });
            // Αριστερό χέρι κάτω (A-Pose)
            gsap.to(bones.l_shoulder.quaternion, { x: 0.4, y: 0, z: 0.6, w: 0.7, duration: speed });
            // Αγκώνες ίσιοι
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
        }

        function gesture_kalimera() {
            is_busy = true;
            // Φέρνει το χέρι μπροστά στο στήθος
            gsap.to(bones.r_shoulder.quaternion, { x: -0.3, y: -0.4, z: -0.2, w: 0.8, duration: 0.5 });
            setTimeout(() => {
                resetPose();
                setTimeout(() => { is_busy = false; }, 600);
            }, 1000);
        }

        function gesture_geia() {
            is_busy = true;
            // Σηκώνει το χέρι στο πλάι για χαιρετισμό
            gsap.to(bones.r_shoulder.quaternion, { x: 0, y: 0, z: -0.7, w: 0.7, duration: 0.4 });
            setTimeout(() => {
                resetPose();
                setTimeout(() => { is_busy = false; }, 600);
            }, 1000);
        }

        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                const w = gesture_queue.shift();
                if (w.includes("καλημερα")) gesture_kalimera();
                else if (w.includes("γεια")) gesture_geia();
            }
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'el-GR'; rec.continuous = true;
        rec.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = t;
            t.split(" ").forEach(word => gesture_queue.push(word));
        };
        micBtn.onclick = () => { rec.start(); micBtn.classList.add('listening'); };

        loadAvatar('rhea.glb');
        document.getElementById('avatar-select').onchange = (e) => loadAvatar(e.target.value);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

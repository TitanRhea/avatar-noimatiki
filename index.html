<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Dual Arm Calibration Tool</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #slider-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.95);
            padding: 15px; border-radius: 10px; pointer-events: auto; text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 14px;
            display: flex; gap: 30px; /* Βάζει τα δύο χέρια δίπλα-δίπλα */
        }
        
        h3 { margin-top: 0; margin-bottom: 10px; color: #333; font-size: 16px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .slider-row { margin-bottom: 8px; }
        .slider-row label { display: inline-block; width: 75px; font-weight: bold; color: #555; }
        .slider-row input { width: 120px; vertical-align: middle; }
        .val-disp { display: inline-block; width: 35px; text-align: right; font-family: monospace; font-weight: bold; color: #0066cc; }
        
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        select { font-size: 16px; padding: 10px 20px; border-radius: 8px; cursor: pointer; pointer-events: auto; border: 1px solid #ccc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="slider-panel">
        
        <div>
            <h3>Δεξί Χέρι (Μπροστά)</h3>
            <div class="slider-row">
                <label>Ώμος X:</label>
                <input type="range" id="r-sh-x" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-r-sh-x">0</span>
            </div>
            <div class="slider-row">
                <label>Ώμος Y:</label>
                <input type="range" id="r-sh-y" min="-180" max="180" value="10" oninput="updatePose()">
                <span class="val-disp" id="val-r-sh-y">10</span>
            </div>
            <div class="slider-row">
                <label>Ώμος Z:</label>
                <input type="range" id="r-sh-z" min="-180" max="180" value="10" oninput="updatePose()">
                <span class="val-disp" id="val-r-sh-z">10</span>
            </div>
            <hr style="border: 0.5px solid #eee; margin: 10px 0;">
            <div class="slider-row">
                <label>Αγκώνας X:</label>
                <input type="range" id="r-el-x" min="-180" max="180" value="-20" oninput="updatePose()">
                <span class="val-disp" id="val-r-el-x">-20</span>
            </div>
            <div class="slider-row">
                <label>Αγκώνας Y:</label>
                <input type="range" id="r-el-y" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-r-el-y">0</span>
            </div>
            <div class="slider-row">
                <label>Αγκώνας Z:</label>
                <input type="range" id="r-el-z" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-r-el-z">0</span>
            </div>
        </div>

        <div>
            <h3>Αριστερό Χέρι (Μπροστά)</h3>
            <div class="slider-row">
                <label>Ώμος X:</label>
                <input type="range" id="l-sh-x" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-l-sh-x">0</span>
            </div>
            <div class="slider-row">
                <label>Ώμος Y:</label>
                <input type="range" id="l-sh-y" min="-180" max="180" value="-10" oninput="updatePose()">
                <span class="val-disp" id="val-l-sh-y">-10</span>
            </div>
            <div class="slider-row">
                <label>Ώμος Z:</label>
                <input type="range" id="l-sh-z" min="-180" max="180" value="-10" oninput="updatePose()">
                <span class="val-disp" id="val-l-sh-z">-10</span>
            </div>
            <hr style="border: 0.5px solid #eee; margin: 10px 0;">
            <div class="slider-row">
                <label>Αγκώνας X:</label>
                <input type="range" id="l-el-x" min="-180" max="180" value="-20" oninput="updatePose()">
                <span class="val-disp" id="val-l-el-x">-20</span>
            </div>
            <div class="slider-row">
                <label>Αγκώνας Y:</label>
                <input type="range" id="l-el-y" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-l-el-y">0</span>
            </div>
            <div class="slider-row">
                <label>Αγκώνας Z:</label>
                <input type="range" id="l-el-z" min="-180" max="180" value="0" oninput="updatePose()">
                <span class="val-disp" id="val-l-el-z">0</span>
            </div>
        </div>

    </div>

    <div id="ui-layer">
        <select id="avatar-select" onchange="loadAvatar(this.value)">
            <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
            <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
        </select>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {};
        const deg = (d) => d * (Math.PI / 180);

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                
                // Set default order to avoid weird twisting
                if(bones.r_shoulder) bones.r_shoulder.rotation.order = 'XYZ';
                if(bones.l_shoulder) bones.l_shoulder.rotation.order = 'XYZ';
                
                // Εφαρμόζει τις αρχικές τιμές των sliders με το που φορτώνει
                updatePose();
            });
        }

        function updatePose() {
            if (!bones.r_shoulder || !bones.l_shoulder) return;

            // Παίρνουμε τις τιμές για το ΔΕΞΙ χέρι
            const rsx = document.getElementById('r-sh-x').value;
            const rsy = document.getElementById('r-sh-y').value;
            const rsz = document.getElementById('r-sh-z').value;
            const rex = document.getElementById('r-el-x').value;
            const rey = document.getElementById('r-el-y').value;
            const rez = document.getElementById('r-el-z').value;

            // Παίρνουμε τις τιμές για το ΑΡΙΣΤΕΡΟ χέρι
            const lsx = document.getElementById('l-sh-x').value;
            const lsy = document.getElementById('l-sh-y').value;
            const lsz = document.getElementById('l-sh-z').value;
            const lex = document.getElementById('l-el-x').value;
            const ley = document.getElementById('l-el-y').value;
            const lez = document.getElementById('l-el-z').value;

            // Ενημερώνουμε τα νουμεράκια στην οθόνη (ΔΕΞΙ)
            document.getElementById('val-r-sh-x').innerText = rsx;
            document.getElementById('val-r-sh-y').innerText = rsy;
            document.getElementById('val-r-sh-z').innerText = rsz;
            document.getElementById('val-r-el-x').innerText = rex;
            document.getElementById('val-r-el-y').innerText = rey;
            document.getElementById('val-r-el-z').innerText = rez;

            // Ενημερώνουμε τα νουμεράκια στην οθόνη (ΑΡΙΣΤΕΡΟ)
            document.getElementById('val-l-sh-x').innerText = lsx;
            document.getElementById('val-l-sh-y').innerText = lsy;
            document.getElementById('val-l-sh-z').innerText = lsz;
            document.getElementById('val-l-el-x').innerText = lex;
            document.getElementById('val-l-el-y').innerText = ley;
            document.getElementById('val-l-el-z').innerText = lez;

            // Εφαρμόζουμε την κίνηση ζωντανά στο μοντέλο
            bones.r_shoulder.rotation.set(deg(rsx), deg(rsy), deg(rsz));
            if(bones.r_elbow) bones.r_elbow.rotation.set(deg(rex), deg(rey), deg(rez));

            bones.l_shoulder.rotation.set(deg(lsx), deg(lsy), deg(lsz));
            if(bones.l_elbow) bones.l_elbow.rotation.set(deg(lex), deg(ley), deg(lez));
        }

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

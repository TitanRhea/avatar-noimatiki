<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Full Gestures Mapped</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 320px;
        }
        .controls { pointer-events: auto; }
        select, button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: 1px solid #ddd; background: white; transition: 0.3s;
        }
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Έτοιμο! Δοκίμασε τις λέξεις με τη νέα λογική.</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false, gesture_queue = [], last_activity_time = Date.now();
        const deg = (d) => d * (Math.PI / 180);

        // --- ΚΛΕΙΔΩΜΕΝΗ ΒΑΣΗ (ΔΕΝ ΑΛΛΑΖΕΙ) ---
        const myPose = { x: 54, y: 30, z: 17 };

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                // ΚΛΕΙΔΩΜΕΝΟ ΥΨΟΣ 0.6
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                        if (b.endsWith('righthand')) bones.r_wrist = n;
                        if (b.endsWith('lefthand')) bones.l_wrist = n;
                    }
                });
                resetPose(0.1);
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            bones.r_shoulder.rotation.order = 'XYZ';
            bones.l_shoulder.rotation.order = 'XYZ';
            
            gsap.to(bones.r_shoulder.rotation, { x: deg(myPose.x), y: deg(myPose.y), z: deg(myPose.z), duration: speed });
            gsap.to(bones.l_shoulder.rotation, { x: deg(myPose.x), y: deg(-myPose.y), z: deg(-myPose.z), duration: speed });
            
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.l_wrist) gsap.to(bones.l_wrist.rotation, { x: 0, y: 0, z: 0, duration: speed });
        }

        function finalize_gesture() {
            setTimeout(() => { resetPose(); is_busy = false; last_activity_time = Date.now(); }, 600);
        }

        // --- 1. ΕΥΧΑΡΙΣΤΩ ---
        // Μαθηματική μετατροπή: Python X=30 -> Web 19 | Python Y=-50 -> Web -20 | Python Z=50 -> Web 67
        function gesture_efcharisto() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(19), y: deg(-20), z: deg(67), duration: 0.45 });
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-110), y: deg(-90), z: 0, duration: 0.45 });
            
            setTimeout(() => {
                // Φάση 2: Python X=35 -> Web 24 | Python Y=-40 -> Web -10 | Python Z=100 -> Web 117
                gsap.to(bones.r_shoulder.rotation, { x: deg(24), y: deg(-10), z: deg(117), duration: 0.55 });
                if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-25), y: deg(20), z: deg(30), duration: 0.55 });
                finalize_gesture();
            }, 800);
        }

        // --- 2. ΚΑΛΗΜΕΡΑ ---
        function gesture_kalimera() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(24), y: deg(-10), z: deg(117), duration: 0.3 });
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-25), y: deg(20), z: deg(30), duration: 0.3 });
            setTimeout(() => { finalize_gesture(); }, 1200);
        }

        // --- 3. ΓΕΙΑ ---
        function gesture_geia() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(24), y: deg(-10), z: deg(117), duration: 0.4 });
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-25), y: deg(20), z: deg(30), duration: 0.4 });
            setTimeout(() => wave_action(4), 450);
        }
        function wave_action(count) {
            if (count <= 0) { finalize_gesture(); return; }
            let z_angle = count % 2 === 0 ? 120 : 60;
            if (bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x: deg(-110), y: 0, z: deg(z_angle), duration: 0.2 });
            setTimeout(() => wave_action(count - 1), 220);
        }

        // --- 4. ΚΑΛΟ ΜΕΣΗΜΕΡΙ ---
        function gesture_kalo_mesimeri() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(24), y: deg(-10), z: deg(117), duration: 0.4 });
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-25), y: deg(20), z: deg(30), duration: 0.4 });
            setTimeout(() => pulse_mesimeri(4), 500);
        }
        function pulse_mesimeri(count) {
            if (count <= 0) { finalize_gesture(); return; }
            if (count % 2 === 0) {
                gsap.to(bones.r_shoulder.rotation, { x: deg(22), y: deg(-12), z: deg(119), duration: 0.2 });
                if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-32), y: deg(10), z: deg(30), duration: 0.2 });
            } else {
                gsap.to(bones.r_shoulder.rotation, { x: deg(21), y: deg(-15), z: deg(122), duration: 0.2 });
                if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(-40), y: 0, z: deg(30), duration: 0.2 });
            }
            setTimeout(() => pulse_mesimeri(count - 1), 220);
        }

        // --- 5. ΟΝΟΜΑ ---
        // Μαθηματική μετατροπή: Python X=20 -> Web 9 | Python Y=-20 -> Web 10 | Python Z=80 -> Web 97
        function gesture_onoma() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(9), y: deg(10), z: deg(97), duration: 0.4 });
            gsap.to(bones.l_shoulder.rotation, { x: deg(9), y: deg(-10), z: deg(-97), duration: 0.4 });
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: 0.4 });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: 0, y: 0, z: 0, duration: 0.4 });
            setTimeout(() => circle_onoma(12), 500); 
        }
        function circle_onoma(step) {
            if (step <= 0) { finalize_gesture(); return; }
            let r_x = 0, r_y = 0, r_z = 30;
            let phase = step % 4;
            if (phase === 0) { r_x = -20; r_y = 20; } 
            else if (phase === 3) { r_x = -10; r_y = 30; } 
            else if (phase === 2) { r_x = 0; r_y = 20; } 
            else if (phase === 1) { r_x = -10; r_y = 10; } 
            
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: deg(r_x), y: deg(r_y), z: deg(r_z), duration: 0.15 });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: deg(r_x), y: deg(-r_y), z: deg(-r_z), duration: 0.15 });
            
            setTimeout(() => circle_onoma(step - 1), 160);
        }

        // --- ΟΥΡΑ ΚΙΝΗΣΕΩΝ & ΦΩΝΗ ---
        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                const w = gesture_queue.shift();
                
                if (w === "γεια" || w === "γειά") gesture_geia();
                else if (w === "καλημέρα" || w === "καλημερα") gesture_kalimera();
                else if (w === "ευχαριστώ" || w === "ευχαριστω") gesture_efcharisto();
                else if (w === "καλό_μεσημέρι" || w === "μεσημέρι" || w === "μεσημερι") gesture_kalo_mesimeri();
                else if (w === "όνομα" || w === "ονομα" || w === "νοηματικό_όνομα") gesture_onoma();
            }
            if (!is_busy && Date.now() - last_activity_time > 4000) resetPose(1.0);
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'el-GR'; 
        rec.continuous = true;
        let is_listening = false;
        
        rec.onstart = () => {
            is_listening = true;
            micBtn.classList.add('listening');
            micBtn.innerText = "🛑 Ακούω... (Πάτα για κλείσιμο)";
        };

        rec.onend = () => {
            is_listening = false;
            micBtn.classList.remove('listening');
            micBtn.innerText = "🎙️ Ενεργοποίηση Μικροφώνου";
        };

        rec.onresult = (e) => {
            let t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = "Είπες: " + t;
            
            t = t.replace(/[.,!?]/g, '');
            t = t.replace("καλό μεσημέρι", "καλό_μεσημέρι").replace("καλο μεσημερι", "καλό_μεσημέρι");
            t = t.replace("νοηματικό όνομα", "νοηματικό_όνομα").replace("νοηματικο ονομα", "νοηματικό_όνομα");
            t = t.replace("το νοηματικό σου", "νοηματικό_όνομα").replace("το νοηματικο σου", "νοηματικό_όνομα");
            t = t.replace("το όνομά σου", "όνομα").replace("το ονομα σου", "όνομα");
            
            t.split(" ").forEach(word => gesture_queue.push(word));
            
            last_activity_time = Date.now();
        };

        micBtn.onclick = () => { 
            if (is_listening) rec.stop();
            else rec.start();
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

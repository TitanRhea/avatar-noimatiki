<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Ελληνική Νοηματική</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 26px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 30px; border-radius: 20px; display: inline-block;
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .controls {
            pointer-events: auto; background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        select, button {
            font-size: 16px; padding: 10px 20px; margin: 5px; border-radius: 8px;
            border: 1px solid #ccc; cursor: pointer;
        }
        
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; transition: 0.3s; }
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Φόρτωση Συστήματος...</div><br>
        <div class="controls">
            <select id="avatar-select">
                <option value="rhea.glb">Avatar 1: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar 2: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση Μικροφώνου</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. ΣΚΗΝΗ ΚΑΙ ΚΑΜΕΡΑ (ΔΙΟΡΘΩΜΕΝΟ ΥΨΟΣ) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.8, 0); 
        controls.update();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 5, 5);
        scene.add(dirLight);

        // --- 2. ΜΕΤΑΒΛΗΤΕΣ ΚΑΙ ΦΟΡΤΩΣΗ ---
        let currentModel = null;
        let r_shoulder, l_shoulder, r_elbow, l_elbow, r_wrist, l_wrist;
        let r_fingers = [], l_fingers = [], r_joints_all = {};
        let is_busy = false;
        let gesture_queue = [];
        let last_activity_time = Date.now();
        
        const deg = (d) => d * (Math.PI / 180);
        
        // Ο ΜΕΤΑΦΡΑΣΤΗΣ (Decoder Ring) ΠΟΥ ΒΡΗΚΑΜΕ: X=V2, Y=V1, Z=V3 και το 65 έγινε -65
        function hprInterval(joint, v1, v2, v3, duration) {
            if (joint) gsap.to(joint.rotation, {x: deg(v2), y: deg(v1), z: deg(v3), duration: duration, ease: "power1.inOut"});
        }
        function invoke(func, delay_sec) { setTimeout(func, delay_sec * 1000); }

        const loader = new THREE.GLTFLoader();

        function load_avatar(filename) {
            document.getElementById('subtitle').innerText = "Φόρτωση " + filename + "...";
            if (currentModel) scene.remove(currentModel);
            r_shoulder = l_shoulder = r_elbow = l_elbow = r_wrist = l_wrist = null;
            r_fingers = []; l_fingers = []; r_joints_all = {};

            loader.load(filename, function(gltf) {
                currentModel = gltf.scene;
                currentModel.position.set(0, -0.5, 0);
                scene.add(currentModel);

                function bind_joint(bone_name) {
                    let found = null;
                    currentModel.traverse((node) => {
                        if (node.isMesh && node.name.toLowerCase().includes('cube')) node.visible = false;
                        if (node.isBone && node.name.endsWith(bone_name)) found = node;
                    });
                    return found;
                }

                r_shoulder = bind_joint(`RightArm`);
                r_elbow    = bind_joint(`RightForeArm`);
                r_wrist    = bind_joint(`RightHand`);
                l_shoulder = bind_joint(`LeftArm`);
                l_elbow    = bind_joint(`LeftForeArm`);
                l_wrist    = bind_joint(`LeftHand`);

                const finger_names = ['Index', 'Middle', 'Ring', 'Pinky', 'Thumb'];
                finger_names.forEach(f => {
                    ['1', '2', '3'].forEach(s => {
                        let rj = bind_joint(`RightHand${f}${s}`);
                        if (rj) {
                            if (f === 'Index') r_joints_all[`Index${s}`] = rj;
                            r_joints_all[`${f}${s}`] = rj;
                            if (s === '1' && f !== 'Thumb') r_fingers.push(rj);
                        }
                    });
                    let lj = bind_joint(`LeftHand${f}1`);
                    if (lj && f !== 'Thumb') l_fingers.push(lj);
                });

                is_busy = false;
                setup_a_pose(0.01);
                document.getElementById('subtitle').innerText = "Σύστημα Έτοιμο!";
            });
        }

        document.getElementById('avatar-select').addEventListener('change', (e) => load_avatar(e.target.value));
        load_avatar('rhea.glb');

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        // --- 3. ΚΙΝΗΣΕΙΣ (ΠΙΣΤΗ ΜΕΤΑΦΡΑΣΗ ΑΠΟ PYTHON) ---
        function setup_a_pose(speed = 0.5) {
            hprInterval(r_shoulder, 0, -65, 0, speed); // Το 65 έγινε -65 στον X
            hprInterval(r_elbow, 0, 0, 0, speed);
            hprInterval(r_wrist, 0, 0, 0, speed);
            hprInterval(l_shoulder, 0, -65, 0, speed);
            hprInterval(l_elbow, 0, 0, 0, speed);
            hprInterval(l_wrist, 0, 0, 0, speed);
            Object.values(r_joints_all).forEach(j => hprInterval(j, 0, 0, 0, speed));
            l_fingers.forEach(j => hprInterval(j, 0, 0, 0, speed));
        }

        function finalize_gesture() {
            last_activity_time = Date.now();
            invoke(() => { is_busy = false; }, 0.4);
        }

        function animate_fingers(state = "close", count = 2) {
            if (count <= 0) return;
            if (state === "close") {
                r_fingers.forEach(f => hprInterval(f, 0, 0, 45, 0.2));
                l_fingers.forEach(f => hprInterval(f, 0, 0, -45, 0.2));
                invoke(() => animate_fingers("open", count), 0.25);
            } else {
                r_fingers.forEach(f => hprInterval(f, 0, 0, 0, 0.2));
                l_fingers.forEach(f => hprInterval(f, 0, 0, 0, 0.2));
                invoke(() => animate_fingers("close", count - 1), 0.25);
            }
        }

        function gesture_efcharisto() {
            setup_a_pose(0.2); is_busy = true;
            hprInterval(r_shoulder, -50, -30, 50, 0.45);
            hprInterval(r_elbow, -90, 110, 0, 0.45);
            hprInterval(r_wrist, 100, -30, 0, 0.45);
            invoke(() => {
                hprInterval(r_shoulder, -40, -35, 100, 0.55);
                hprInterval(l_shoulder, 40, -35, -100, 0.55);
                hprInterval(r_elbow, 20, 25, 30, 0.55);
                hprInterval(l_elbow, -20, 25, -30, 0.55);
                hprInterval(r_wrist, 20, -30, 100, 0.55);
                hprInterval(l_wrist, -20, -30, -100, 0.55);
                invoke(() => animate_fingers("close", 2), 0.4);
                invoke(finalize_gesture, 1.4);
            }, 0.8);
        }

        function shake_index(state = "bend", count = 2) {
            if (count <= 0) { invoke(finalize_gesture, 0.2); return; }
            ['1', '2', '3'].forEach(s => { 
                let key = `Index${s}`; 
                if(r_joints_all[key]) hprInterval(r_joints_all[key], 0, (state==="bend"?-40:0), 0, 0.1); 
            });
            invoke(() => shake_index(state==="bend"?"straight":"bend", state==="bend"?count:count-1), 0.15);
        }

        function mouza_action() {
            hprInterval(r_wrist, 0, 80, 100, 0.2);
            r_fingers.forEach(f => hprInterval(f, 0, 0, -40, 0.15));
            invoke(() => {
                hprInterval(r_wrist, 15, 60, 100, 0.15);
                for (let name in r_joints_all) {
                    let j = r_joints_all[name];
                    if (name.includes('Thumb')) hprInterval(j, -40, -40, 0, 0.15);
                    else if (!name.includes('Index')) hprInterval(j, 0, -110, 0, 0.15);
                }
                invoke(() => shake_index("bend", 2), 0.3);
            }, 0.1);
        }

        function gesture_kalimera() {
            setup_a_pose(0.2); is_busy = true;
            hprInterval(r_shoulder, -40, -35, 100, 0.3);
            hprInterval(r_elbow, 20, 25, 30, 0.3);
            hprInterval(r_wrist, 20, -30, 100, 0.3);
            invoke(mouza_action, 0.8);
        }

        function gesture_geia() {
            setup_a_pose(0.2); is_busy = true;
            hprInterval(r_shoulder, -40, -35, 100, 0.4);
            hprInterval(r_elbow, 20, 25, 30, 0.4);
            hprInterval(r_wrist, 0, 110, 90, 0.4);
            let count = 4;
            const wave = (side) => {
                if (count-- <= 0) { finalize_gesture(); return; }
                hprInterval(r_wrist, 0, 110, (side==='r'?120:60), 0.2);
                invoke(() => wave(side==='r'?'l':'r'), 0.2);
            };
            invoke(() => wave('r'), 0.5);
        }

        function gesture_onoma() {
            setup_a_pose(0.2); is_busy = true;
            hprInterval(r_shoulder, -20, -20, 80, 0.4);
            for (let n in r_joints_all) if (!n.includes('Index')) hprInterval(r_joints_all[n], 0, -90, 0, 0.3);
            invoke(() => {
                hprInterval(r_shoulder, -30, -20, 80, 0.3);
                hprInterval(l_shoulder, 30, -20, -80, 0.3);
                hprInterval(r_wrist, 0, 90, 90, 0.3);
                hprInterval(l_wrist, 0, 90, -90, 0.3);
                invoke(finalize_gesture, 1.0);
            }, 0.8);
        }

        // --- 4. ΜΗΧΑΝΙΣΜΟΣ ΟΥΡΑΣ ΚΑΙ ΦΩΝΗΣ ---
        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                let word = gesture_queue.shift();
                if (word.includes("ευχαριστ")) gesture_efcharisto();
                else if (word.includes("καλημερα")) gesture_kalimera();
                else if (word.includes("γεια")) gesture_geia();
                else if (word.includes("ονομα")) gesture_onoma();
            }
            if (!is_busy && gesture_queue.length === 0 && (Date.now() - last_activity_time > 3000)) setup_a_pose(1.0);
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'el-GR'; recognition.continuous = true;

        recognition.onresult = (event) => {
            let text = event.results[event.results.length - 1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = "Είπες: " + text;
            text.split(" ").forEach(w => gesture_queue.push(w));
            last_activity_time = Date.now();
        };
        
        micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); };
    </script>
</body>
</html>

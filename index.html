<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhea Final - A-Pose Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: auto;
        }
        #subtitle {
            font-size: 18px; color: #333; background: rgba(255,255,255,0.9);
            padding: 12px 20px; border-radius: 20px; display: inline-block; 
            margin-bottom: 10px; font-weight: bold; min-width: 300px;
        }
        button { 
            font-size: 16px; padding: 12px 25px; border-radius: 10px; border: none;
            background: #4CAF50; color: white; font-weight: bold; cursor: pointer;
        }
        button.listening { background-color: #f44336; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="subtitle">Φόρτωση Rhea...</div><br>
        <button id="mic-btn">🎙️ Μίλησε στην Rhea</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 3); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.4, 0);
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        const deg = (d) => d * (Math.PI / 180);
        
        // Διόρθωση Α-Pose: Αυτές οι μοίρες θα φέρουν τα χέρια κάτω φυσικά
        const basePose = { x: 75, y: 15, z: 10 }; 
        const VOWEL_OPEN = { 'α': 110, 'ε': 102, 'η': 102, 'ι': 98, 'ο': 108, 'υ': 98, 'ω': 108 };

        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        function loadAvatar(file) {
            loader.load(file + "?v=" + Date.now(), (gltf) => {
                currentModel = gltf.scene;
                currentModel.traverse(n => {
                    if (n.isMesh && (n.name.toLowerCase().includes('cube') || n.name.toLowerCase().includes('box'))) n.visible = false;
                    
                    if (n.isBone) {
                        const bl = n.name.toLowerCase();
                        if (bl.includes('jaw')) bones.jaw = n;
                        if (bl.includes('rightarm') || bl.endsWith('arm.r')) bones.r_shoulder = n;
                        if (bl.includes('rightforearm') || bl.endsWith('forearm.r')) bones.r_elbow = n;
                        if (bl.includes('righthand') || bl.endsWith('hand.r')) bones.r_wrist = n;
                        
                        const match = bl.match(/(thumb|index|middle|ring|pinky)(\d)/);
                        if (match && (bl.includes('right') || bl.includes('.r'))) {
                            bones.r_joints = bones.r_joints || {};
                            bones.r_joints[match[0]] = n;
                        }
                    }
                });
                scene.add(currentModel);
                setTimeout(() => { resetPose(0.1); if(bones.jaw) bones.jaw.rotation.x = deg(90); }, 500);
                document.getElementById('subtitle').innerText = "Rhea: Έτοιμη!";
            });
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(basePose.z), duration: speed });
            if(bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if(bones.r_wrist) gsap.to(bones.r_wrist.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if(bones.r_joints) Object.values(bones.r_joints).forEach(j => gsap.to(j.rotation, { x: 0, duration: speed }));
        }

        function speak(word, time = 1.5) {
            if (!bones.jaw) return;
            const vowels = [...word.toLowerCase()].filter(c => VOWEL_OPEN[c]);
            const tl = gsap.timeline();
            vowels.forEach(v => {
                tl.to(bones.jaw.rotation, { x: deg(VOWEL_OPEN[v]), duration: (time/vowels.length)/2 })
                  .to(bones.jaw.rotation, { x: deg(90), duration: (time/vowels.length)/2 });
            });
        }

        // --- ΚΙΝΗΣΕΙΣ ---
        function gesture_onoma() {
            is_busy = true; speak("Όνομα", 1);
            gsap.to(bones.r_shoulder.rotation, { x: deg(20), y: deg(-10), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-40), duration: 0.5 });
            setTimeout(() => { resetPose(); is_busy = false; }, 3000);
        }

        function gesture_kalimera() {
            is_busy = true; speak("Καλημέρα", 1.2);
            gsap.to(bones.r_shoulder.rotation, { x: deg(40), z: deg(-20), duration: 0.6 });
            setTimeout(() => { resetPose(); is_busy = false; }, 2500);
        }

        function gesture_geia() {
            is_busy = true; speak("Γεια", 0.8);
            gsap.to(bones.r_shoulder.rotation, { x: deg(10), y: deg(30), duration: 0.4 });
            setTimeout(() => { resetPose(); is_busy = false; }, 2000);
        }

        const micBtn = document.getElementById('mic-btn');
        if ('webkitSpeechRecognition' in window) {
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR';
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase();
                document.getElementById('subtitle').innerText = "Είπες: " + text;
                if (text.includes("όνομα")) gesture_onoma();
                else if (text.includes("καλημέρα")) gesture_kalimera();
                else if (text.includes("γεια")) gesture_geia();
                else speak(text);
            };
            micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); setTimeout(()=>micBtn.classList.remove('listening'), 3000); };
        }

        loadAvatar('updated_model.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

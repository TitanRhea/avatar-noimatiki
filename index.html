<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Final Sign Language Integrated</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 22px; color: #333; background: rgba(255, 255, 255, 0.95);
            padding: 12px 25px; border-radius: 20px; display: inline-block; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 380px;
        }
        .controls { pointer-events: auto; }
        button { 
            font-size: 16px; padding: 12px 25px; margin: 5px; border-radius: 10px; 
            cursor: pointer; border: none; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button.listening { background-color: #f44336; }
        select { font-size: 16px; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white;}

        #debug-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.98);
            padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: sans-serif; pointer-events: auto; width: 320px;
            max-height: 90vh; overflow-y: auto; z-index: 1000;
        }
        #debug-panel h2 { margin-top: 0; font-size: 18px; color: #333; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 5px;}
        #debug-panel h3 { font-size: 14px; margin-bottom: 5px; color: #555;}
        .debug-select { width: 100%; padding: 8px; margin-bottom: 10px; font-size: 14px;}
        .slider-group { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee;}
        .slider-group label { font-size: 13px; font-weight: bold; color: #444; display: block; margin-bottom: 5px;}
        .slider-group input { width: 100%; margin: 0; }
        .val-display { float: right; color: #2196F3; font-weight: bold;}
        .debug-btns { display: flex; gap: 5px; }
        .reset-btn { flex: 1; background: #FF9800; font-size: 14px; padding: 10px; }
        .export-btn { flex: 1; background: #2196F3; font-size: 14px; padding: 10px; }
        #export-area { width: 100%; height: 100px; margin-top: 10px; display: none; font-family: monospace; font-size: 11px;}
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="debug-panel">
        <h2>🛠️ Εργαλείο Άκρων</h2>
        <h3>1. Χέρι</h3>
        <select id="hand-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="right">▶️ Δεξί</option>
            <option value="left">◀️ Αριστερό</option>
        </select>
        <h3>2. Δάχτυλο</h3>
        <select id="finger-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="thumb">👍 Αντίχειρας</option>
            <option value="index" selected>☝️ Δείκτης</option>
            <option value="middle">🖕 Μεσαίος</option>
            <option value="ring">💍 Παράμεσος</option>
            <option value="pinky">🤏 Μικρός</option>
        </select>
        <h3>3. Άρθρωση</h3>
        <select id="joint-select" class="debug-select" onchange="loadCurrentAngles()">
            <option value="1" selected>🦴 MCP (1)</option>
            <option value="2">🦴 PIP (2)</option>
            <option value="3">🦴 DIP (3)</option>
        </select>
        <div class="slider-group">
            <label>Άξονας X: <span id="valX" class="val-display">0</span>°</label>
            <input type="range" id="sliderX" min="-180" max="180" value="0" oninput="updateBoneRotation()">
            <label>Άξονας Y: <span id="valY" class="val-display">0</span>°</label>
            <input type="range" id="sliderY" min="-180" max="180" value="0" oninput="updateBoneRotation()">
            <label>Άξονας Z: <span id="valZ" class="val-display">0</span>°</label>
            <input type="range" id="sliderZ" min="-180" max="180" value="0" oninput="updateBoneRotation()">
        </div>
        <div class="debug-btns">
            <button class="reset-btn" onclick="resetCurrentFinger()">🔄 Reset</button>
            <button class="export-btn" onclick="exportData()">📥 JSON</button>
        </div>
        <textarea id="export-area" readonly></textarea>
    </div>

    <div id="ui-layer">
        <div id="subtitle">Μικρόφωνο Κλειστό</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea (Γυναίκα)</option>
                <option value="titan.glb">Avatar: Titan (Άνδρας)</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.8, 4.5); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        let last_trigger_time = 0; 
        const deg = (d) => d * (Math.PI / 180);
        const basePose = { x: 54, y: 30, z: 17 };

        let debugAngles = { right: {}, left: {} };
        ['right', 'left'].forEach(side => {
            ['thumb', 'index', 'middle', 'ring', 'pinky'].forEach(f => {
                debugAngles[side][f] = { "1":{x:0,y:0,z:0}, "2":{x:0,y:0,z:0}, "3":{x:0,y:0,z:0} };
            });
        });

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = { r_fingers: {}, l_fingers: {} }; 
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                currentModel.position.set(0, 0.6, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);
                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                        if (b.endsWith('righthand')) bones.r_wrist = n;
                        if (b.endsWith('lefthand')) bones.l_wrist = n;
                        ['thumb', 'index', 'middle', 'ring', 'pinky'].forEach(f => {
                            for(let i=1; i<=3; i++) {
                                if (b.includes('righthand' + f) && b.endsWith(f + i)) bones.r_fingers[f + i] = n;
                                if (b.includes('lefthand' + f) && b.endsWith(f + i)) bones.l_fingers[f + i] = n;
                            }
                        });
                    }
                });
                resetPose(0.1);
            });
        }

        function updateBoneRotation() {
            if (!currentModel) return;
            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            const joint = document.getElementById('joint-select').value;
            const x = parseFloat(document.getElementById('sliderX').value);
            const y = parseFloat(document.getElementById('sliderY').value);
            const z = parseFloat(document.getElementById('sliderZ').value);
            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valZ').innerText = z;
            debugAngles[side][finger][joint] = {x, y, z};
            const boneMap = side === 'right' ? bones.r_fingers : bones.l_fingers;
            if (boneMap[finger + joint]) {
                boneMap[finger + joint].rotation.set(deg(x), deg(y), deg(z));
            }
        }

        function loadCurrentAngles() {
            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            const joint = document.getElementById('joint-select').value;
            const a = debugAngles[side][finger][joint];
            document.getElementById('sliderX').value = a.x;
            document.getElementById('sliderY').value = a.y;
            document.getElementById('sliderZ').value = a.z;
            document.getElementById('valX').innerText = a.x;
            document.getElementById('valY').innerText = a.y;
            document.getElementById('valZ').innerText = a.z;
        }

        function resetCurrentFinger() {
            const side = document.getElementById('hand-select').value;
            const finger = document.getElementById('finger-select').value;
            for(let i=1; i<=3; i++) {
                debugAngles[side][finger][i] = {x:0, y:0, z:0};
                const boneMap = side === 'right' ? bones.r_fingers : bones.l_fingers;
                if(boneMap[finger + i]) boneMap[finger + i].rotation.set(0,0,0);
            }
            loadCurrentAngles();
        }

        function exportData() {
            const area = document.getElementById('export-area');
            area.style.display = 'block';
            area.value = JSON.stringify(debugAngles, null, 2);
            area.select();
        }

        // --- CUSTOM POSITIONS BASED ON USER DATA ---
        function applyCustomFist(side, duration = 0.2) {
            const bf = side === 'r' ? bones.r_fingers : bones.l_fingers;
            const s = side === 'r' ? 1 : -1;
            // Ευχαριστώ - Position Data
            gsap.to(bf['thumb1'].rotation, {x: deg(14), y: deg(-14), z: deg(27*s), duration});
            gsap.to(bf['index1'].rotation, {x: deg(52), y: 0, z: deg(9*s), duration});
            gsap.to(bf['middle1'].rotation, {x: deg(55), y: deg(4), z: deg(3*s), duration});
            gsap.to(bf['ring1'].rotation, {x: deg(51), y: deg(5), z: deg(-4*s), duration});
            gsap.to(bf['pinky1'].rotation, {x: deg(52), y: deg(-31), z: deg(-8*s), duration});
        }

        function applyKalimeraPart2(side, duration = 0.2) {
            const bf = side === 'r' ? bones.r_fingers : bones.l_fingers;
            const s = side === 'r' ? 1 : -1;
            // Καλημέρα - Position Data
            gsap.to(bf['thumb3'].rotation, {x: deg(14), y: deg(-14*s), z: deg(68*s), duration});
            ['middle', 'ring', 'pinky'].forEach(f => {
                gsap.to(bf[f+'1'].rotation, {x: deg(68), duration});
                gsap.to(bf[f+'2'].rotation, {x: deg(114), y: deg(22*(f==='middle'?s:0)), z: deg(1*s), duration});
                gsap.to(bf[f+'3'].rotation, {x: deg(90), duration});
            });
            // Index straight
            gsap.to(bf['index1'].rotation, {x: 0, y:0, z:0, duration});
        }

        function resetPose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            is_busy = false;
            gsap.to(bones.r_shoulder.rotation, { x: deg(basePose.x), y: deg(-basePose.y), z: deg(basePose.z), duration: speed });
            gsap.to(bones.l_shoulder.rotation, { x: deg(basePose.x), y: deg(basePose.y), z: deg(-basePose.z), duration: speed });
            [bones.r_elbow, bones.l_elbow, bones.r_wrist, bones.l_wrist].forEach(b => b && gsap.to(b.rotation, { x: 0, y: 0, z: 0, duration: speed }));
            Object.values(bones.r_fingers).concat(Object.values(bones.l_fingers)).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: speed }));
        }

        // --- GESTURES ---
        function gesture_efcharisto() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(27), y: deg(-35), z: deg(-26), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(25), y: deg(-26), z: deg(-107), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(-27), z: deg(-24), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(91), y: deg(-24), z: deg(-107), duration: 0.5 });
                gsap.to(bones.l_shoulder.rotation, { x: deg(52), y: deg(27), z: deg(24), duration: 0.5 });
                gsap.to(bones.l_elbow.rotation, { x: deg(91), y: deg(24), z: deg(107), duration: 0.5 });
                const pulse = gsap.timeline({ repeat: 2, onComplete: resetPose });
                pulse.to({}, { duration: 0.1, onStart: () => { applyCustomFist('r'); applyCustomFist('l'); } })
                     .to({}, { duration: 0.35 })
                     .to({}, { duration: 0.1, onStart: () => { 
                         Object.values(bones.r_fingers).concat(Object.values(bones.l_fingers)).forEach(f => gsap.to(f.rotation, { x:0, y:0, z:0, duration: 0.1 }));
                      } })
                     .to({}, { duration: 0.35 });
            }, 600);
        }

        function gesture_kalimera() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                applyCustomFist('r', 0.2); // Phase 1: Fist like "efcharisto"
                setTimeout(() => {
                    applyKalimeraPart2('r', 0.2); // Phase 2: Kalimera pose
                    setTimeout(() => {
                        const idx = [bones.r_fingers['index1'], bones.r_fingers['index2'], bones.r_fingers['index3']];
                        const flick = gsap.timeline({ repeat: 1, onComplete: resetPose });
                        flick.to(idx.map(b=>b.rotation), { x: deg(60), duration: 0.15 })
                             .to(idx.map(b=>b.rotation), { x: 0, duration: 0.15 });
                    }, 300);
                }, 400);
            }, 600);
        }

        function gesture_onoma() {
            is_busy = true;
            // Mirrors Kalimera to both hands
            gsap.to(bones.r_shoulder.rotation, { x: deg(39), y: deg(-24), z: deg(-58), duration: 0.5 });
            gsap.to(bones.l_shoulder.rotation, { x: deg(39), y: deg(24), z: deg(58), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(59), y: deg(1), z: deg(-48), duration: 0.5 });
            gsap.to(bones.l_elbow.rotation, { x: deg(59), y: deg(1), z: deg(48), duration: 0.5 });
            
            applyKalimeraPart2('r', 0.3);
            applyKalimeraPart2('l', 0.3);

            let start = Date.now();
            const draw = () => {
                let el = (Date.now() - start) / 1000;
                if (el < 3.2) {
                    const r = 0.35; // Increased radius for clear circles
                    bones.r_wrist.rotation.x = Math.sin(el * 10) * r;
                    bones.r_wrist.rotation.y = Math.cos(el * 10) * r;
                    bones.l_wrist.rotation.x = Math.sin(el * 10) * r;
                    bones.l_wrist.rotation.y = -Math.cos(el * 10) * r;
                    requestAnimationFrame(draw);
                } else { resetPose(); }
            };
            draw();
        }

        function gesture_mesimeri() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(70), y: deg(14), z: deg(-17), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(108), y: deg(-31), z: deg(-69), duration: 0.5 });
            setTimeout(() => {
                gsap.to(bones.r_shoulder.rotation, { x: deg(52), y: deg(7), z: deg(-34), duration: 0.5 });
                gsap.to(bones.r_elbow.rotation, { x: deg(21), y: deg(-44), z: deg(-121), duration: 0.5 });
                const tl = gsap.timeline({ repeat: 2, onComplete: resetPose });
                tl.to(bones.r_wrist.rotation, { y: deg(40), duration: 0.4 }).to(bones.r_wrist.rotation, { y: deg(-40), duration: 0.4 });
            }, 600);
        }

        function gesture_geia() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(11), y: deg(18), z: deg(4), duration: 0.5 });
            gsap.to(bones.r_elbow.rotation, { x: deg(-10), y: deg(35), z: deg(-128), duration: 0.5 });
            setTimeout(() => {
                const tl = gsap.timeline({ repeat: 4, onComplete: resetPose });
                tl.to(bones.r_wrist.rotation, { z: deg(25), duration: 0.25 }).to(bones.r_wrist.rotation, { z: deg(-25), duration: 0.25 });
            }, 600);
        }

        // --- SPEECH CONTROL ---
        const micBtn = document.getElementById('mic-btn'), subtitle = document.getElementById('subtitle');
        let recognition = null, isListening = false;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'el-GR'; recognition.continuous = true; recognition.interimResults = true;
            recognition.onresult = (e) => {
                let text = ""; for (let i = e.resultIndex; i < e.results.length; ++i) text += e.results[i][0].transcript;
                text = text.toLowerCase().trim(); subtitle.innerText = "Είπες: " + text;
                const now = Date.now(); if (is_busy || (now - last_trigger_time < 2000)) return;
                if (text.includes("ευχαριστ")) { last_trigger_time = now; gesture_efcharisto(); }
                else if (text.includes("καλημερ")) { last_trigger_time = now; gesture_kalimera(); }
                else if (text.includes("μεσημερ")) { last_trigger_time = now; gesture_mesimeri(); }
                else if (text.includes("γεια") || text.includes("χαιρετ")) { last_trigger_time = now; gesture_geia(); }
                else if (text.includes("ονομ") || text.includes("ποιο")) { last_trigger_time = now; gesture_onoma(); }
            };
            recognition.onend = () => { if(isListening) recognition.start(); };
        }
        micBtn.onclick = () => {
            if (!isListening) { recognition.start(); isListening = true; micBtn.innerText = "🛑 Κλείσιμο"; micBtn.classList.add('listening'); subtitle.innerText = "Ακούω..."; }
            else { isListening = false; recognition.stop(); micBtn.innerText = "🎙️ Ενεργοποίηση"; micBtn.classList.remove('listening'); subtitle.innerText = "Μικρόφωνο Κλειστό"; }
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

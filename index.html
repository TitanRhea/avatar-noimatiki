<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Final Positioning</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 24px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px; border-radius: 15px; display: inline-block; margin-bottom: 10px;
        }
        
        .controls { pointer-events: auto; background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 12px; display: inline-block; }
        select, button { font-size: 16px; padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer; border: 1px solid #ccc;}
        #mic-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold;}
        #mic-btn.listening { background-color: #f44336; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Το σύστημα φορτώνει...</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)">
                <option value="rhea.glb">Avatar: Rhea</option>
                <option value="titan.glb">Avatar: Titan</option>
            </select>
            <button id="mic-btn">🎙️ Ενεργοποίηση</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        // --- 1. ΔΙΟΡΘΩΣΗ ΚΑΜΕΡΑΣ ΓΙΑ ΚΕΝΤΡΑΡΙΣΜΑ ---
        // Ρυθμίσαμε το ύψος (1.4) και την απόσταση (4.5) για να φαίνεται το αβατάρ σωστά.
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.4, 4.5); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        // Το κέντρο εστίασης ανέβηκε στο στήθος (1.2)
        controls.target.set(0, 1.2, 0); 
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        let currentModel = null, bones = {}, is_busy = false, gesture_queue = [], last_activity_time = Date.now();
        const deg = (d) => d * (Math.PI / 180);

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            bones = {};
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                // ΔΙΟΡΘΩΣΗ: Τοποθέτηση του μοντέλου vertically στο κέντρο
                currentModel.position.set(0, -1.0, 0); 
                currentModel.scale.set(1.1, 1.1, 1.1); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                // Ενεργοποίηση της σωστής A-pose αμέσως
                setup_a_pose(0.1);
                document.getElementById('subtitle').innerText = "Έτοιμος! Πες 'Γεια'.";
            });
        }

        // --- 2. ΔΙΟΡΘΩΣΗ ΠΟΖΑΣ (A-POSE) ΜΕ QUATERNION ---
        // Σταματάμε να χρησιμοποιούμε μοίρες (X,Y,Z) που στρίβουν ανάποδα.
        // Χρησιμοποιούμε απευθείας Quaternion για να "αναγκάσουμε" τα χέρια να πέσουν φυσιολογικά κάτω στα πλάγια.
        function setup_a_pose(speed = 0.5) {
            if (!bones.r_shoulder) return;
            // Καθαρή A-pose για το δεξί χέρι (Παρακάμπτει το μπέρδεμα των αξόνων)
            gsap.to(bones.r_shoulder.quaternion, { x: 0.4, y: 0, z: -0.6, w: 0.7, duration: speed });
            // Καθαρή A-pose για το αριστερό χέρι (Mirror)
            gsap.to(bones.l_shoulder.quaternion, { x: 0.4, y: 0, z: 0.6, w: 0.7, duration: speed });
            
            // Αγκώνες ίσιοι
            if (bones.r_elbow) gsap.to(bones.r_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
            if (bones.l_elbow) gsap.to(bones.l_elbow.rotation, { x: 0, y: 0, z: 0, duration: speed });
        }

        function finalize_gesture() {
            last_activity_time = Date.now();
            invoke(() => { is_busy = false; }, 0.4);
        }

        // --- 3. ΚΙΝΗΣΕΙΣ ---
        // Χρησιμοποιούμε απλό hprInterval (Y,X,Z) για τις κινήσεις, τώρα που η βάση (A-pose) είναι σωστή.
        function hprInterval(joint, v1, v2, v3, duration) {
            if (joint) gsap.to(joint.rotation, {x: deg(v1), y: deg(v2), z: deg(v3), duration: duration, ease: "power1.inOut"});
        }
        function invoke(func, delay_sec) { setTimeout(func, delay_sec * 1000); }

        function gesture_geia() {
            setup_a_pose(0.2); is_busy = true;
            // Σηκώνει το χέρι μπροστά και πλάι
            hprInterval(bones.r_shoulder, 20, 50, -40, 0.4);
            setTimeout(() => { wave_action(4); }, 500);
        }
        
        function wave_action(count) {
            if (count <= 0) { finalize_gesture(); return; }
            hprInterval(bones.r_shoulder, 20, 50, (count%2===0?-60:-20), 0.2);
            setTimeout(() => wave_action(count-1), 250);
        }

        // --- ΜΗΧΑΝΙΣΜΟΣ ΟΥΡΑΣ ΚΑΙ ΦΩΝΗΣ ---
        setInterval(() => {
            if (!is_busy && gesture_queue.length > 0) {
                let word = gesture_queue.shift();
                if (word.includes("γεια")) gesture_geia();
            }
            if (!is_busy && Date.now() - last_activity_time > 4000) setup_a_pose(1.0);
        }, 100);

        const micBtn = document.getElementById('mic-btn');
        let recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.lang = 'el-GR'; recognition.continuous = true;
        recognition.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = "Είπες: " + t;
            t.split(" ").forEach(w => gesture_queue.push(w));
            last_activity_time = Date.now();
        };
        micBtn.onclick = () => { recognition.start(); micBtn.classList.add('listening'); };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

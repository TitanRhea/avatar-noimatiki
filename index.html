<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bone Detector</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #f0e6dc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        h1 { color: #333; }
        #bone-list {
            background: #fff; padding: 15px; border-radius: 10px;
            border: 2px solid #4CAF50; font-family: monospace;
            white-space: pre-wrap; height: 70vh; overflow-y: auto;
            font-size: 16px; color: #111; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .instruction { font-size: 18px; margin-bottom: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <h1>Ανιχνευτής Σκελετού (Bone Detector)</h1>
    <div class="instruction">
        Μόλις φορτώσει η λίστα από κάτω, κάνε την Αντιγραφή (Copy) και κάνε την Επικόλληση (Paste) στη συνομιλία μας.
    </div>
    
    <div id="bone-list">Αναμονή για φόρτωση του updated_model.glb...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <script>
        const loader = new THREE.GLTFLoader();
        const dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
        loader.setDRACOLoader(dracoLoader);

        let boneNames = [];

        // Βάζουμε cache-buster για να είμαστε σίγουροι ότι διαβάζει το σωστό αρχείο
        loader.load('updated_model.glb?v=' + Date.now(), (gltf) => {
            gltf.scene.traverse((node) => {
                if (node.isBone) {
                    boneNames.push(node.name);
                }
            });

            if (boneNames.length > 0) {
                document.getElementById('bone-list').innerText = "Βρέθηκαν " + boneNames.length + " κόκκαλα:\n\n" + boneNames.join("\n");
            } else {
                document.getElementById('bone-list').innerText = "Δεν βρέθηκαν κόκκαλα (Bones) στο αρχείο. Μήπως δεν έχει σκελετό;";
            }

        }, undefined, (error) => {
            document.getElementById('bone-list').innerText = "Σφάλμα φόρτωσης του αρχείου: " + error.message;
            console.error(error);
        });
    </script>
</body>
</html>

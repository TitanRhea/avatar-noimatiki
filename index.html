<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Avatar - Final UI & Pose</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0e6dc; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; pointer-events: none;
        }
        #subtitle {
            font-size: 22px; color: #333; background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px; border-radius: 15px; display: inline-block; margin-bottom: 10px;
        }
        #lab {
            position: absolute; top: 10px; left: 10px; background: white; padding: 15px;
            border-radius: 10px; pointer-events: auto; font-size: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .slider-group { margin-bottom: 8px; }
        input { width: 120px; cursor: pointer; }
        .controls { pointer-events: auto; }
        button { padding: 10px 20px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #mic-btn.listening { background: #f44336; }
    </style>
</head>
<body>

    <div id="lab">
        <b>🛠️ Τελική Ρύθμιση Ώμων</b><br>
        <p style="margin:5px 0; color:#666;">Οι τιμές σου με μεγαλύτερο άνοιγμα (Z).</p>
        <div class="slider-group">Κλίση (X): <input type="range" id="x" min="-180" max="180" value="-36"> <span id="vx">-36</span></div>
        <div class="slider-group">Στροφή (Y): <input type="range" id="y" min="-180" max="180" value="-41"> <span id="vy">-41</span></div>
        <div class="slider-group">Άνοιγμα (Z): <input type="range" id="z" min="-180" max="180" value="-80"> <span id="vz">-80</span></div>
        <hr>
        <button onclick="copyValues()" style="width:100%; background:#2196F3;">Αποθήκευση Τιμών</button>
    </div>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="subtitle">Σύστημα Έτοιμο</div><br>
        <div class="controls">
            <select id="avatar-select" onchange="loadAvatar(this.value)" style="padding:10px; border-radius:5px;">
                <option value="rhea.glb">Avatar: Rhea</option>
                <option value="titan.glb">Avatar: Titan</option>
            </select>
            <button id="mic-btn">🎙️ Μικρόφωνο</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0e6dc);
        
        // ΚΑΜΕΡΑ: Ρυθμισμένη για να βλέπει το στήθος χωρίς ροδέλα
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.2, 3.8); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0); // Εστίαση στο ύψος του στήθους
        controls.update();

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        let currentModel = null, bones = {}, is_busy = false;
        const deg = (d) => d * (Math.PI / 180);

        function loadAvatar(file) {
            if (currentModel) scene.remove(currentModel);
            new THREE.GLTFLoader().load(file, (gltf) => {
                currentModel = gltf.scene;
                // ΤΟΠΟΘΕΤΗΣΗ: Κατεβαίνει για να είναι κέντρο
                currentModel.position.set(0, -1.8, 0); 
                currentModel.scale.set(1.2, 1.2, 1.2); 
                scene.add(currentModel);

                currentModel.traverse(n => {
                    if (n.isMesh && n.name.toLowerCase().includes('cube')) n.visible = false;
                    if (n.isBone) {
                        const b = n.name.toLowerCase();
                        if (b.endsWith('rightarm')) bones.r_shoulder = n;
                        if (b.endsWith('leftarm')) bones.l_shoulder = n;
                        if (b.endsWith('rightforearm')) bones.r_elbow = n;
                        if (b.endsWith('leftforearm')) bones.l_elbow = n;
                    }
                });
                applyPose();
            });
        }

        function applyPose() {
            if (!bones.r_shoulder) return;
            const rx = parseFloat(document.getElementById('x').value);
            const ry = parseFloat(document.getElementById('y').value);
            const rz = parseFloat(document.getElementById('z').value);
            
            document.getElementById('vx').innerText = rx;
            document.getElementById('vy').innerText = ry;
            document.getElementById('vz').innerText = rz;

            // Σειρά περιστροφής YXZ (Ursina style)
            bones.r_shoulder.rotation.order = 'YXZ';
            bones.l_shoulder.rotation.order = 'YXZ';
            
            bones.r_shoulder.rotation.set(deg(rx), deg(ry), deg(rz));
            bones.l_shoulder.rotation.set(deg(rx), deg(-ry), deg(-rz));
        }

        ['x','y','z'].forEach(id => document.getElementById(id).addEventListener('input', applyPose));

        function copyValues() {
            const val = `X: ${document.getElementById('x').value}, Y: ${document.getElementById('y').value}, Z: ${document.getElementById('z').value}`;
            alert("Τέλειες τιμές! Στείλε μου τες: " + val);
        }

        // --- ΚΙΝΗΣΕΙΣ ---
        function gesture_kalimera() {
            is_busy = true;
            gsap.to(bones.r_shoulder.rotation, { x: deg(-20), y: deg(20), z: deg(-30), duration: 0.5 });
            setTimeout(() => { applyPose(); is_busy = false; }, 1200);
        }

        const micBtn = document.getElementById('mic-btn');
        let rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'el-GR'; rec.continuous = true;
        rec.onresult = (e) => {
            const t = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('subtitle').innerText = "Είπες: " + t;
            if (t.includes("καλημέρα")) gesture_kalimera();
        };
        
        micBtn.onclick = () => { 
            rec.start(); 
            micBtn.classList.add('listening');
            micBtn.innerText = "🛑 Ακούω...";
        };

        loadAvatar('rhea.glb');
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
